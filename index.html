ot(){let b=builds[pick],sp=pick==='ki'?15:12,sz=pick==='burst'?26:16;shots.push({x:p.f>0?p.x+p.w:p.x-16,y:p.y+30,w:sz,h:10,vx:p.f*sp,v:b.s+(pick==='ki'?charge:0),c:b.fx});burst(p.x+p.w/2,p.y+30,b.fx,8)}function util(){let b=builds[pick];if(p.rCD>0)return;p.rCD=160;if(pick==='rubber'){dodge=90;inv=90;say('Observation dodge.');burst(p.x,p.y,b.fx,25)}else if(pick==='mage'){fly=150;say('Float online.');burst(p.x,p.y,b.fx,25)}else if(pick==='ki'){charge=10;p.en=Math.min(100,p.en+45);say('Power charged.');burst(p.x,p.y,b.fx,35)}else if(pick==='aura'){slow=180;say('Aura slow field.');burst(p.x,p.y,b.fx,30)}else if(pick==='burst'){p.vx=p.f*18;p.vy=-4;say('Dash burst.');burst(p.x,p.y,b.fx,20)}else{inv=80;say('Shield guard.');burst(p.x,p.y,b.fx,20)}}function update(){t++;let b=builds[pick];if(inv>0)inv--;if(fly>0)fly--;if(slow>0)slow--;if(dodge>0)dodge--;if(p.rCD>0)p.rCD--;if(keys.a){p.vx-=1.15;p.f=-1}if(keys.d){p.vx+=1.15;p.f=1}p.vx=clamp(p.vx,-8,8)*.84;if(keys.w&&p.on){p.vy=-14;p.on=0;burst(p.x+p.w/2,p.y+p.h,'#374151',8)}if(keys.r)util();if(keys.j&&p.atk<=0)p.atk=12;if(keys.u&&p.sp<=0){p.sp=18;burst(p.x+p.w/2,p.y+p.h/2,b.fx,16)}if(keys.k){p.hold++;if(p.hold>24&&b.canBeam&&p.en>0){p.beam=1;p.en-=.65;if(t%4===0)burst(p.x+p.w/2,p.y+30,b.fx,3)}else if(p.hold>24&&!b.canBeam){if(pick==='rubber'){let q=nearest();if(q&&Math.abs(q.x-p.x)<230&&t%12===0){q.vx+=(q.x<p.x?-1:1)*9;burst(q.x,q.y,b.fx,8)}say('Pressure aura: pushes, no damage.')}else say('No beam on this build.')}}else{if(lastK&&p.hold>0&&p.hold<=24&&p.shotCD<=0){shoot();p.shotCD=24}p.hold=0;p.beam=0}lastK=keys.k;if(p.atk>0)p.atk--;if(p.sp>0)p.sp--;if(p.shotCD>0)p.shotCD--;if(!p.beam&&p.en<100)p.en+=.4;phys(p);if(p.atk===11){let hb=jBox();burst(hb.x+hb.w/2,hb.y+hb.h/2,b.fx,10);for(let e of en)if(!e.down&&hit(hb,e))dmg(e,b.m);if(boss.live&&!boss.dead&&hit(hb,boss))dmg(boss,b.m)}if(p.sp===17){for(let hb of uBoxes()){burst(hb.x+hb.w/2,hb.y+hb.h/2,b.fx,hb.chain?6:12);for(let e of en)if(!e.down&&hit(hb,e))dmg(e,hb.chain?b.uD*.45: keRect(sx(o.x),o.y,o.w,o.h)}function drawFx(){for(let q of fx){g.globalAlpha=Math.max(0,q.life/35);g.fillStyle=q.c;g.beginPath();g.arc(sx(q.x),q.y,q.s,0,Math.PI*2);g.fill()}g.globalAlpha=1}function select(){bg();g.fillStyle='rgba(25,24,45,.74)';g.fillRect(0,0,900,500);text('Choose Character',318,55,32,'#111827');let arr=['basic','burst','mage','rubber','ki','aura'];for(let i=0;i<arr.length;i++){let k=arr[i],b=builds[k],x=55+(i%3)*280,y=90+Math.floor(i/3)*185;g.fillStyle='rgba(255,255,255,.83)';g.fillRect(x,y,235,150);g.strokeStyle=b.fx;g.lineWidth=4;g.strokeRect(x,y,235,150);g.fillStyle=b.c;g.fillRect(x+18,y+34,34,54);if(k==='mage')g.drawImage(staff,x+42,y+26,48,48);text((i+1)+'. '+b.n,x+18,y+24,18);text('J: '+b.j,x+18,y+93,13);text('U: '+b.u,x+18,y+113,13);text('R: '+b.r,x+18,y+133,13);text(b.canBeam?'K: shot / hold beam':'K: shot / hold utility',x+18,y+150,12)}text('Press 1-6',390,470,18)}function draw(){bg();if(state==='select'){select();return}for(let q of plats()){g.fillStyle='#c59b72';g.fillRect(sx(q.x),q.y,q.w,q.h);g.fillStyle='#689f7d';g.fillRect(sx(q.x),q.y,q.w,7)}if(!boss.live){rect(npc,key?'#9ca3af':'#c0841a');rect(door,key&&!en.some(e=>!e.down)?'#168987':'#8a5a44')}let b=builds[pick];if(p.atk>0){let hb=jBox();g.fillStyle='rgba(110,80,0,.42)';g.fillRect(sx(hb.x),hb.y,hb.w,hb.h)}if(p.sp>0){for(let hb of uBoxes()){g.fillStyle=hb.chain?'rgba(70,30,120,.55)':'rgba(30,70,90,.44)';g.fillRect(sx(hb.x),hb.y,hb.w,hb.h)}}if(p.beam){let hb=beamBox();g.globalAlpha=.40;g.fillStyle=b.fx;g.fillRect(sx(hb.x),hb.y,hb.w,hb.h);g.globalAlpha=1;g.fillStyle='#111827';g.fillRect(sx(hb.x),hb.y+hb.h/2-4,hb.w,8)}drawFx();for(let s of shots)rect(s,s.c);for(let e of en)if(!e.down)rect(e,e.c);if(boss.live&&!boss.dead)rect(boss,'#7e22ce');rect(p,b.c);if(pick==='mage')g.drawImage(staff,sx(p.x)+(p.f>0?22:-28),p.y-5,48,48);if(inv>0){g.strokeStyle='#111827';g.lineWidth=3;g.strokeRect(sx(p.x)-5,p.y-5,p.w+10,p.h+10)}text('HP '+Math.floor(p.hp),25,35);text('EN '+Math.floor(p.en),25,60);text(b.n,25,85);text('R CD '+Math.ceil(p.rCD/60),25,110);boss.live?text('Boss '+Math.floor(boss.hp),560,35):text('Defeated '+score+' Left '+en.filter(e=>!e.down).length,560,35);if(msgT>0){g.fillStyle='rgba(255,255,255,.88)';g.fillRect(240,90,430,45);text(msg,260,118)}if(state==='win'||state==='lose'){g.fillStyle='rgba(0,0,0,.72)';g.fillRect(0,0,900,500);text(state==='win'?'YOU WIN':'YOU LOSE',340,230,42,'white')}}function loop(){if(state==='play')update();draw();requestAnimationFrame(loop)}btn.onclick=()=>location.reload();spawn();loop();</script></body></html>
