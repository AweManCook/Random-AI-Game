<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Platform Fighter V5.7 Boss Update</title><style>

</style></head><body><h1>Platform Fighter V5.7 Boss Update</h1>
<p>1-7 select | A/D move | W jump | J attack | U special | tap/hold K | R utility | E interact</p>
<canvas id="gameCanvas" width="900" height="500"></canvas><button id="restartButton">Restart</button><script>
const cv=document.getElementById("gameCanvas"),ctx=cv.getContext("2d"),btn=document.getElementById("restartButton");
const keys={}; let state="select",pick="basic",cam=0,t=0,msg="",msgT=0,key=false,score=0,lastK=false,beamLock=false,shots=[],parts=[],haz=[],inv=0,fly=0,slow=0,dodge=0,charge=0,shake=0;
const staff=new Image(); staff.src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAABF0lEQVR4AeyTMQrCQBBFN9ZioWBlJR7AE3gKKy/gmfQAVp7CE3gASytBC7GPPHEkLAbzZxckkMBnskt2/pvZTC/8+UkGKA+DMqWGJAAzt+gBcQOkmFZBXQBmXizuBcks8q5KBojNVcP4ewkgNr9OZuVtNQ7EOHHTtQRgSQFBrPfnPsEtGYD7NuG6nDwIbskAmzD/zP3ofCqGu0sgegkkACrHqArBOkUSQNWIfwCxZ5F3VRKAVb4Ox9f8h/djnXkvpSABkDmnOfkaA1B9bnMJIDbfLqacT1bjDiQ71SToANrZASai5krl7XZ2gDLjsWTPo/Z2wFPttzNdB+QO5BxBrkQG4FBOuQByjSCFuAA4mEsygFr9L9AnAAAA///S23ENAAAABklEQVQDAJevUUHmqrU9AAAAAElFTkSuQmCC";
window.onkeydown=e=>{let k=e.key.toLowerCase();keys[k]=true;if(state==="select"&&"1234567".includes(k)){pick=["basic","burst","mage","rubber","ki","aura","curse"][+k-1];state="play";say(builds[pick].name+" selected");pop(450,250,builds[pick].fx,45);}};
window.onkeyup=e=>{let k=e.key.toLowerCase();keys[k]=false;if(k==="k")beamLock=false;};
const builds={
 basic:{name:"Basic Fighter",color:"#4d7fd6",fx:"#005f73",core:"#fff",j:"Slash",u:"Guard Burst",r:"Shield",m:22,uD:15,s:12,b:4,cost:.7,beam:true},
 burst:{name:"Burst Striker",color:"#d94f70",fx:"#8f2d56",core:"#fff",j:"Heavy Cleave",u:"Ground Slam",r:"Dash",m:32,uD:24,s:19,b:6,cost:1.1,beam:true},
 mage:{name:"Thousand-Year Mage",color:"#7c5dc7",fx:"#553c9a",core:"#fff",j:"Staff Stab",u:"Auto Aim Chain",r:"Float",m:18,uD:16.5,s:5,b:3,cost:.5,beam:true,auto:true},
 rubber:{name:"Rubber Pirate",color:"#d95d69",fx:"#9f1239",core:"#fff",j:"Stretch Punch",u:"Elastic Slam",r:"Observation Dodge",m:20,uD:18,s:10,b:0,cost:0,beam:false},
 ki:{name:"Ki Warrior",color:"#2b6cb0",fx:"#2563eb",core:"#fff",j:"Meteor Kick",u:"Ki Flare",r:"Power Charge",m:25,uD:20,s:17,b:5,cost:1,beam:true},
 aura:{name:"Aura Hunter",color:"#2b8f86",fx:"#581c87",core:"#fff",j:"Quick Claw",u:"Aura Snare",r:"Slow Field",m:21,uD:24,s:9,b:0,cost:0,beam:false,auto:true},
 curse:{name:"Cursed Brawler",color:"#111827",fx:"#7f1d1d",core:"#fff",j:"Black Flash Jab",u:"Domain Snare",r:"Reverse Flow",m:30,uD:18,s:13,b:0,cost:0,beam:false,auto:true}
};
const level=[{x:0,y:450,w:3800,h:50},{x:220,y:330,w:250,h:22},{x:620,y:270,w:240,h:22},{x:1050,y:350,w:270,h:22},{x:1480,y:300,w:260,h:22},{x:1880,y:240,w:250,h:22},{x:2260,y:350,w:280,h:22},{x:2700,y:295,w:260,h:22},{x:3180,y:340,w:270,h:22}];
const arena=[{x:2920,y:430,w:980,h:70}]; const npc={x:1880,y:178,w:42,h:62},door={x:3400,y:330,w:70,h:120};
let p={x:80,y:350,w:40,h:60,vx:0,vy:0,f:1,on:false,hp:140,en:100,atk:0,sp:0,rCD:0,shotCD:0,hold:0,beam:false};
let boss={x:3420,y:250,w:78,h:100,vx:0,vy:0,hp:500,max:500,on:false,live:false,dead:false,cd:90,move:"",moveT:0,phase:1,f:1};
let enemies=[];
function enemy(x,y,type="g"){let fast=type==="f",tank=type==="t";return{x,y,w:tank?55:42,h:tank?72:62,vx:0,vy:0,hp:tank?82:fast?32:48,dead:false,c:tank?"#9b4d4d":fast?"#c26f20":"#c45454"};}
function spawn(){enemies=[enemy(520,350),enemy(860,200,"f"),enemy(1240,350),enemy(1640,230,"t"),enemy(2050,180,"f"),enemy(2420,350),enemy(2860,230,"t"),enemy(3140,270,"f")];}
function plats(){return boss.live?arena:level} function sx(x){return x-cam} function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y} function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function say(s){msg=s;msgT=115} function text(s,x,y,z=14,col="#111827"){ctx.save();ctx.font=z+"px Arial";ctx.lineWidth=4;ctx.strokeStyle="rgba(255,255,255,.85)";ctx.strokeText(s,x,y);ctx.fillStyle=col;ctx.fillText(s,x,y);ctx.restore();}
function pop(x,y,c,n=16){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.8)*5,life:18+Math.random()*24,s:2+Math.random()*5,c});}
function physics(o){o.vy+=fly&&o===p?.25:.72;o.x+=o.vx;o.y+=o.vy;o.on=false;o.x=clamp(o.x,0,3790-o.w);for(let q of plats()) if(hit(o,q)&&o.vy>=0){o.y=q.y-o.h;o.vy=0;o.on=true;} if(o.y>700){ if(o===p){p.hp-=25;if(boss.live){p.x=3060;p.y=240;cam=2900}else{p.x=80;p.y=200}p.vx=p.vy=0;pop(p.x+20,p.y+30,"#111827",20)} else if(o===boss){boss.x=3420;boss.y=250;boss.vx=boss.vy=0;pop(boss.x,boss.y,"#581c87",25)} else{o.x-=100;o.y=200;o.vx=o.vy=0}}}
function nearest(){let arr=enemies.filter(e=>!e.dead);if(boss.live&&!boss.dead)arr.push(boss);if(!arr.length)return null;arr.sort((a,b)=>Math.abs((a.x+a.w/2)-(p.x+20))-Math.abs((b.x+b.w/2)-(p.x+20)));return arr[0];}
function dmg(o,a){let b=builds[pick];o.hp-=a;o.vx=(o.x<p.x?-1:1)*6;pop(o.x+o.w/2,o.y+o.h/2,b.fx,14);if(o!==boss&&o.hp<=0&&!o.dead){o.dead=true;score++;pop(o.x+o.w/2,o.y+o.h/2,"#111827",25)}if(o===boss&&o.hp<=0&&!boss.dead){boss.dead=true;state="win";btn.style.display="inline-block";}}
function jBox(){if(pick==="mage")return{x:p.f>0?p.x+70:p.x-130,y:p.y+12,w:110,h:34};if(pick==="rubber")return{x:p.f>0?p.x+p.w:p.x-150,y:p.y+10,w:150,h:42};return{x:p.f>0?p.x+p.w:p.x-80,y:p.y+8,w:80,h:48};}
function uBoxes(){let b=builds[pick],q=nearest();if(pick==="mage"&&q){let cx=p.x+20,cy=p.y+28,tx=q.x+q.w/2,ty=q.y+q.h/2;return[{x:q.x-14,y:q.y-14,w:q.w+28,h:q.h+28,chain:false},{x:Math.min(cx,tx),y:Math.min(cy,ty)-10,w:Math.max(20,Math.abs(tx-cx)),h:20,chain:true}]}if((pick==="aura"||pick==="curse")&&q)return[{x:q.x-28,y:q.y-28,w:q.w+56,h:q.h+56}];if(pick==="burst")return[{x:p.x-80,y:p.y+20,w:p.w+160,h:70}];if(pick==="rubber")return[{x:p.x-95,y:p.y-20,w:p.w+190,h:p.h+45}];return[{x:p.x-55,y:p.y-35,w:p.w+110,h:p.h+70}];}
function beamBox(){let b=builds[pick];return{x:p.f>0?p.x+p.w:p.x-720,y:p.y+28-b.b*4,w:720,h:Math.max(24,b.b*12)}}
function shoot(){let b=builds[pick];shots.push({x:p.f>0?p.x+p.w:p.x-16,y:p.y+30,w:pick==="burst"?26:16,h:10,vx:p.f*(pick==="ki"?15:12),d:b.s+(pick==="ki"?charge:0),c:b.fx,owner:"p"});pop(p.x+20,p.y+30,b.fx,8)}
function utility(){let b=builds[pick];if(p.rCD>0)return;p.rCD=160;if(pick==="rubber"){inv=90;say("Observation dodge.")}else if(pick==="mage"){fly=150;say("Float online.")}else if(pick==="ki"){charge=10;p.en=Math.min(100,p.en+45);say("Blue-white ki charged.")}else if(pick==="aura"){slow=180;say("Aura slow field.")}else if(pick==="curse"){p.hp=Math.min(140,p.hp+22);inv=45;say("Reverse flow heal.")}else if(pick==="burst"){p.vx=p.f*18;p.vy=-4;say("Dash burst.")}else{inv=80;say("Shield guard.")}pop(p.x,p.y,b.fx,28)}
function useBossMove(name){boss.move=name;boss.moveT=0;boss.cd=120;shake=8;say("Boss: "+name);pop(boss.x+boss.w/2,boss.y+boss.h/2,"#4c1d95",35)}
function updateBoss(){if(!boss.live||boss.dead)return;boss.phase=boss.hp<boss.max*.5?2:1;boss.moveT++;if(boss.cd>0)boss.cd--;let dx=p.x-boss.x;boss.f=dx>0?1:-1;if(boss.move==="dash"){boss.vx=boss.f*(boss.phase===2?9:7);if(boss.moveT>26){boss.move=""}}else if(boss.move==="slam"){boss.vx*=.7;if(boss.moveT===34){haz.push({x:boss.x-220,y:410,w:520,h:40,t:34,d:20,c:"#4c1d95"});shake=12;pop(boss.x+boss.w/2,420,"#4c1d95",50)}if(boss.moveT>55)boss.move=""}else if(boss.move==="orbs"){boss.vx*=.8;if(boss.moveT%18===0)for(let i=0;i<(boss.phase===2?5:3);i++)shots.push({x:3000+i*175+Math.random()*70,y:150,w:18,h:18,vx:0,vy:4+Math.random()*2,d:12,c:"#581c87",owner:"boss"});if(boss.moveT>95)boss.move=""}else if(boss.move==="laser"){boss.vx*=.8;if(boss.moveT>25&&boss.moveT<70){haz.push({x:boss.f>0?boss.x+boss.w:boss.x-520,y:boss.y+35,w:520,h:24,t:4,d:8,c:"#111827"});if(boss.moveT%8===0)shake=6}if(boss.moveT>80)boss.move=""}else{boss.vx+=Math.sign(dx)*.18;boss.vx=clamp(boss.vx,-3.2,3.2);if(boss.cd<=0){let r=Math.random();useBossMove(r<.25?"dash":r<.5?"slam":r<.75?"orbs":"laser")}}physics(boss);if(hit(boss,p)&&inv<=0){p.hp-=10;p.vx=boss.f*8;pop(p.x,p.y,"#991b1b",10)}}
function update(){t++;let b=builds[pick];if(shake>0)shake*=.82;if(inv>0)inv--;if(fly>0)fly--;if(slow>0)slow--;if(p.rCD>0)p.rCD--;if(keys.a){p.vx-=1.15;p.f=-1}if(keys.d){p.vx+=1.15;p.f=1}p.vx=clamp(p.vx,-8,8)*.84;if(keys.w&&p.on){p.vy=-14;p.on=false;pop(p.x+20,p.y+60,"#374151",8)}if(keys.r)utility();if(keys.j&&p.atk<=0)p.atk=12;if(keys.u&&p.sp<=0){p.sp=18;pop(p.x+20,p.y+30,b.fx,16)}if(keys.k){p.hold++;if(p.hold>24&&b.beam){if(!beamLock&&p.en>=b.cost){p.beam=true;p.en=Math.max(0,p.en-b.cost);shake=Math.max(shake,4);if(p.en<=0){p.beam=false;beamLock=true;say("Beam drained. Release K.")}if(t%4===0)pop(p.x+20,p.y+30,b.fx,3)}else{p.beam=false;if(beamLock)say("Release K to restart beam.");else say("Not enough energy.")}}else if(p.hold>24&&!b.beam){p.beam=false;if(pick==="rubber"){let q=nearest();if(q&&Math.abs(q.x-p.x)<230&&t%12===0){q.vx+=(q.x<p.x?-1:1)*9;pop(q.x,q.y,b.fx,8)}say("Pressure aura: pushes, no damage.")}else say("No beam on this build.")}}else{if(lastK&&p.hold>0&&p.hold<=24&&p.shotCD<=0){shoot();p.shotCD=24}p.hold=0;p.beam=false;beamLock=false}lastK=keys.k;if(p.atk>0)p.atk--;if(p.sp>0)p.sp--;if(p.shotCD>0)p.shotCD--;if(!p.beam&&p.en<100)p.en+=.45;physics(p);
if(p.atk===11){let hb=jBox();pop(hb.x+hb.w/2,hb.y+hb.h/2,b.fx,pick==="curse"?25:10);for(let e of enemies)if(!e.dead&&hit(hb,e))dmg(e,b.m+(pick==="curse"?6:0));if(boss.live&&!boss.dead&&hit(hb,boss))dmg(boss,b.m+(pick==="curse"?6:0));if(pick==="curse")shake=5}
if(p.sp===17){for(let hb of uBoxes()){pop(hb.x+hb.w/2,hb.y+hb.h/2,b.fx,hb.chain?6:12);for(let e of enemies)if(!e.dead&&hit(hb,e))dmg(e,hb.chain?b.uD*.45:b.uD);if(boss.live&&!boss.dead&&hit(hb,boss))dmg(boss,hb.chain?b.uD*.45:b.uD)}}
if(p.beam&&t%6===0){let hb=beamBox();for(let e of enemies)if(!e.dead&&hit(hb,e))dmg(e,b.b);if(boss.live&&!boss.dead&&hit(hb,boss))dmg(boss,b.b)}
for(let i=shots.length-1;i>=0;i--){let s=shots[i];s.x+=s.vx;s.y+=(s.vy||0);pop(s.x,s.y,s.c,1);let gone=false;if(s.owner==="boss"){if(hit(s,p)&&inv<=0){p.hp-=s.d;gone=true;pop(p.x,p.y,"#991b1b",10)}}else{for(let e of enemies)if(!e.dead&&hit(s,e)){dmg(e,s.d);gone=true}if(boss.live&&!boss.dead&&hit(s,boss)){dmg(boss,s.d);gone=true}}if(gone||s.x<cam-150||s.x>cam+1050||s.y>520)shots.splice(i,1)}
for(let i=haz.length-1;i>=0;i--){let h=haz[i];h.t--;if(hit(h,p)&&inv<=0){p.hp-=h.d;inv=20;pop(p.x,p.y,"#991b1b",12)}if(h.t<=0)haz.splice(i,1)}
let mod=slow?.35:1;if(!boss.live){for(let e of enemies){if(e.dead)continue;let dx=p.x-e.x;e.vx+=Math.sign(dx)*.25*mod;e.vx=clamp(e.vx,-3,3)*.92;if(Math.abs(dx)<55&&t%55===0&&inv<=0){p.hp-=8;pop(p.x,p.y,"#991b1b",8)}physics(e)}}else updateBoss();
if(!boss.live&&Math.abs(p.x-npc.x)<100){if(score>=3){say("Guide: press E for key");if(keys.e){keys.e=false;key=true;say("Key obtained. Clear all enemies.")}}else say("Guide: defeat 3 first "+score+"/3")}
if(!boss.live&&Math.abs(p.x-door.x)<130){if(!key)say("Door locked. Find guide.");else if(enemies.some(e=>!e.dead))say("Clear remaining enemies.");else if(keys.e){keys.e=false;boss.live=true;boss.dead=false;boss.hp=boss.max;boss.x=3420;boss.y=250;boss.vx=boss.vy=0;p.x=3060;p.y=330;p.vx=p.vy=0;cam=2900;say("Boss arena entered.");pop(3400,360,"#4c1d95",50)}}
if(p.hp<=0){state="lose";btn.style.display="inline-block"}for(let i=parts.length-1;i>=0;i--){let q=parts[i];q.x+=q.vx;q.y+=q.vy;q.vy+=.14;q.life--;if(q.life<=0)parts.splice(i,1)}cam+=(clamp((boss.live?3300:p.x)-450,0,2920)-cam)*.1;if(msgT>0)msgT--}
function bg(){let gr=ctx.createLinearGradient(0,0,0,500);gr.addColorStop(0,boss.live?"#17132e":"#cdefff");gr.addColorStop(1,boss.live?"#33204f":"#ffe9d6");ctx.fillStyle=gr;ctx.fillRect(0,0,900,500);if(boss.live){ctx.fillStyle="rgba(255,255,255,.12)";for(let i=0;i<9;i++){ctx.beginPath();ctx.arc(80+i*105,90+Math.sin(t/30+i)*25,45,0,Math.PI*2);ctx.fill()}ctx.fillStyle="rgba(127,29,29,.16)";ctx.fillRect(0,390,900,80)}else{ctx.fillStyle="#b7d9c4";for(let x=-200;x<3900;x+=520){ctx.beginPath();ctx.arc(sx(x),470,180,Math.PI,0);ctx.fill()}}}
function rect(o,c){ctx.fillStyle=c;ctx.fillRect(sx(o.x),o.y,o.w,o.h);ctx.strokeStyle="#111827";ctx.strokeRect(sx(o.x),o.y,o.w,o.h)}
function drawFx(){for(let q of parts){ctx.globalAlpha=Math.max(0,q.life/35);ctx.fillStyle=q.c;ctx.beginPath();ctx.arc(sx(q.x),q.y,q.s,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function select(){bg();ctx.fillStyle="rgba(25,24,45,.74)";ctx.fillRect(0,0,900,500);text("Choose Character",318,55,32);let arr=["basic","burst","mage","rubber","ki","aura","curse"];for(let i=0;i<arr.length;i++){let k=arr[i],b=builds[k],x=35+(i%4)*215,y=90+Math.floor(i/4)*185;ctx.fillStyle="rgba(255,255,255,.83)";ctx.fillRect(x,y,195,150);ctx.strokeStyle=b.fx;ctx.lineWidth=4;ctx.strokeRect(x,y,195,150);ctx.fillStyle=b.color;ctx.fillRect(x+14,y+34,30,54);if(k==="mage")ctx.drawImage(staff,x+38,y+26,46,46);text((i+1)+". "+b.name,x+14,y+24,15);text("J: "+b.j,x+14,y+93,12);text("U: "+b.u,x+14,y+113,12);text("R: "+b.r,x+14,y+133,12);text(b.beam?"K: shot / beam":"K: shot / utility",x+14,y+150,11)}text("Press 1-7",390,470,18)}
function draw(){let ox=shake?(Math.random()-.5)*shake:0,oy=shake?(Math.random()-.5)*shake:0;ctx.save();ctx.translate(ox,oy);bg();if(state==="select"){select();ctx.restore();return}for(let q of plats()){ctx.fillStyle=boss.live?"#1f1638":"#c59b72";ctx.fillRect(sx(q.x),q.y,q.w,q.h);ctx.fillStyle=boss.live?"#6d28d9":"#689f7d";ctx.fillRect(sx(q.x),q.y,q.w,7)}if(!boss.live){rect(npc,key?"#9ca3af":"#c0841a");rect(door,key&&!enemies.some(e=>!e.dead)?"#168987":"#8a5a44")}let b=builds[pick];if(p.atk>0){let hb=jBox();ctx.fillStyle="rgba(110,80,0,.42)";ctx.fillRect(sx(hb.x),hb.y,hb.w,hb.h)}if(p.sp>0)for(let hb of uBoxes()){ctx.fillStyle=hb.chain?"rgba(70,30,120,.55)":"rgba(30,70,90,.44)";ctx.fillRect(sx(hb.x),hb.y,hb.w,hb.h)}if(p.beam){let hb=beamBox();ctx.globalAlpha=.42;ctx.fillStyle=b.fx;ctx.fillRect(sx(hb.x),hb.y,hb.w,hb.h);ctx.globalAlpha=1;ctx.fillStyle=b.core;ctx.fillRect(sx(hb.x),hb.y+hb.h/2-5,hb.w,10)}for(let h of haz){ctx.globalAlpha=.55;ctx.fillStyle=h.c;ctx.fillRect(sx(h.x),h.y,h.w,h.h);ctx.globalAlpha=1}drawFx();for(let s of shots)rect(s,s.c);for(let e of enemies)if(!e.dead)rect(e,e.c);if(boss.live&&!boss.dead){rect(boss,"#7e22ce");text(boss.move||"stalking",sx(boss.x)-10,boss.y-12,13,"white")}rect(p,b.color);if(pick==="mage")ctx.drawImage(staff,sx(p.x)+(p.f>0?22:-28),p.y-5,48,48);if(inv>0){ctx.strokeStyle="#111827";ctx.lineWidth=3;ctx.strokeRect(sx(p.x)-5,p.y-5,p.w+10,p.h+10)}text("HP "+Math.floor(p.hp),25,35);text("EN "+Math.floor(p.en),25,60);text(b.name,25,85);text("R CD "+Math.ceil(p.rCD/60),25,110);boss.live?text("Boss "+Math.floor(boss.hp),560,35,16,"white"):text("Defeated "+score+" Left "+enemies.filter(e=>!e.dead).length,560,35);if(msgT>0){ctx.fillStyle="rgba(255,255,255,.88)";ctx.fillRect(240,90,430,45);text(msg,260,118)}if(state==="win"||state==="lose"){ctx.fillStyle="rgba(0,0,0,.72)";ctx.fillRect(0,0,900,500);text(state==="win"?"YOU WIN":"YOU LOSE",340,230,42,"white")}ctx.restore()}
function loop(){if(state==="play")update();draw();requestAnimationFrame(loop)}btn.onclick=()=>location.reload();spawn();loop();
</script></body></html>
