<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Platform Fighter Prototype V2</title>
  <style>
    body { margin: 0; background: #20242b; color: white; font-family: Arial, sans-serif; text-align: center; }
    h1 { margin: 14px 0 6px; }
    p { margin: 4px 0 12px; color: #d7d7d7; }
    canvas { background: #87c7ff; border: 4px solid white; display: block; margin: 0 auto; }
    button { margin-top: 12px; padding: 10px 16px; font-size: 16px; cursor: pointer; display: none; }
  </style>
</head>
<body>
  <h1>2D Platform Fighter Prototype V2</h1>
  <p>A/D = move | W = jump | J = melee | K = ranged attack</p>
  <canvas id="gameCanvas" width="900" height="500"></canvas>
  <button id="restartButton">Restart Match</button>

  <script>
    /*
      Beginner notes:
      This is still a one-file JavaScript Canvas game.
      New features:
      - Faster movement
      - K shoots a ranged projectile
      - Enemy has simple fighting AI
      - Player has lives and respawns
      - Loading screen before the fight starts
    */

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const restartButton = document.getElementById("restartButton");

    // Keyboard input storage. If keys["a"] is true, A is being held.
    const keys = {};
    window.addEventListener("keydown", event => keys[event.key.toLowerCase()] = true);
    window.addEventListener("keyup", event => keys[event.key.toLowerCase()] = false);

    // Simple rectangle collision checker.
    function rectanglesOverlap(a, b) {
      return a.x < b.x + b.width &&
             a.x + a.width > b.x &&
             a.y < b.y + b.height &&
             a.y + a.height > b.y;
    }

    const gravity = 0.7;
    const friction = 0.82;

    // Game states: loading, playing, win, lose.
    let gameState = "loading";
    let loadingTimer = 110;
    let message = "";

    // Player respawn variables.
    let playerLives = 3;
    let respawnTimer = 0;
    let invincibleTimer = 0;

    // Arena platforms.
    const platforms = [
      { x: 0, y: 450, width: 900, height: 50 },
      { x: 150, y: 320, width: 220, height: 22 },
      { x: 530, y: 260, width: 220, height: 22 }
    ];

    const player = {
      x: 100, y: 350, width: 40, height: 60, color: "#2f80ed",
      vx: 0, vy: 0,
      speed: 1.15, maxSpeed: 8.5, jumpPower: -14.5,
      onGround: false, facing: 1,
      health: 100, maxHealth: 100,
      attacking: false, attackTimer: 0, attackDuration: 12,
      attackCooldown: 0, attackCooldownMax: 20, hasHitEnemy: false,
      rangedCooldown: 0, rangedCooldownMax: 28
    };

    const enemy = {
      x: 690, y: 350, width: 45, height: 65, color: "#e74c3c",
      vx: 0, vy: 0,
      speed: 0.55, maxSpeed: 4.2, jumpPower: -12,
      onGround: false, facing: -1,
      health: 140, maxHealth: 140,
      defeated: false,
      attacking: false, attackTimer: 0, attackDuration: 14,
      attackCooldown: 0, attackCooldownMax: 55, hasHitPlayer: false,
      rangedCooldown: 0, rangedCooldownMax: 95
    };

    // Projectiles are ranged attacks. They are small moving rectangles.
    const projectiles = [];

    function drawRect(obj) {
      // Blink the player while invincible after respawn.
      if (obj === player && invincibleTimer > 0 && Math.floor(invincibleTimer / 6) % 2 === 0) return;
      ctx.fillStyle = obj.color;
      ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
      ctx.strokeStyle = "black";
      ctx.lineWidth = 2;
      ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
    }

    function drawHealthBar(x, y, width, height, hp, maxHp, label) {
      const percent = Math.max(hp / maxHp, 0);
      ctx.fillStyle = "#333";
      ctx.fillRect(x, y, width, height);
      ctx.fillStyle = "#2ecc71";
      ctx.fillRect(x, y, width * percent, height);
      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, width, height);
      ctx.fillStyle = "white";
      ctx.font = "16px Arial";
      ctx.fillText(label + ": " + Math.max(hp, 0), x, y - 6);
    }

    function applyPhysics(obj) {
      obj.vy += gravity;
      obj.x += obj.vx;
      if (obj.x < 0) { obj.x = 0; obj.vx = 0; }
      if (obj.x + obj.width > canvas.width) { obj.x = canvas.width - obj.width; obj.vx = 0; }
      obj.y += obj.vy;
      obj.onGround = false;

      // Land on platforms only while falling.
      for (let platform of platforms) {
        if (rectanglesOverlap(obj, platform) && obj.vy > 0) {
          obj.y = platform.y - obj.height;
          obj.vy = 0;
          obj.onGround = true;
        }
      }

      // Falling offstage hurts player or resets enemy.
      if (obj.y > canvas.height + 180) {
        if (obj === player) damagePlayer(999);
        else { enemy.x = 690; enemy.y = 350; enemy.vx = 0; enemy.vy = 0; }
      }
    }

    function getPlayerMeleeHitbox() {
      const w = 60;
      return {
        x: player.facing === 1 ? player.x + player.width : player.x - w,
        y: player.y + 14,
        width: w,
        height: 38
      };
    }

    function getEnemyMeleeHitbox() {
      const w = 52;
      return {
        x: enemy.facing === 1 ? enemy.x + enemy.width : enemy.x - w,
        y: enemy.y + 16,
        width: w,
        height: 40
      };
    }

    function spawnProjectile(owner, x, y, direction) {
      projectiles.push({
        x: x, y: y, width: 18, height: 10,
        vx: 11 * direction,
        owner: owner,
        damage: owner === "player" ? 14 : 10,
        color: owner === "player" ? "#00f5d4" : "#ff7b00"
      });
    }

    function damagePlayer(amount) {
      if (gameState !== "playing" || invincibleTimer > 0 || respawnTimer > 0) return;
      player.health -= amount;
      player.vx = -player.facing * 8;
      player.vy = -5;

      if (player.health <= 0) {
        playerLives--;
        respawnTimer = 80;
        if (playerLives <= 0) {
          gameState = "lose";
          message = "You ran out of lives!";
          restartButton.style.display = "inline-block";
        }
      }
    }

    function updateRespawn() {
      if (respawnTimer <= 0) return;
      respawnTimer--;
      player.x = 80;
      player.y = 120;
      player.vx = 0;
      player.vy = 0;
      if (respawnTimer === 0 && gameState === "playing") {
        player.x = 100;
        player.y = 350;
        player.health = player.maxHealth;
        invincibleTimer = 120;
      }
    }

    function updatePlayer() {
      if (respawnTimer > 0) return;

      // Faster movement than version 1.
      if (keys["a"]) { player.vx -= player.speed; player.facing = -1; }
      if (keys["d"]) { player.vx += player.speed; player.facing = 1; }
      player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));

      if (keys["w"] && player.onGround) {
        player.vy = player.jumpPower;
        player.onGround = false;
      }

      player.vx *= friction;

      // J = melee attack.
      if (keys["j"] && player.attackCooldown <= 0 && !player.attacking) {
        player.attacking = true;
        player.attackTimer = player.attackDuration;
        player.attackCooldown = player.attackCooldownMax;
        player.hasHitEnemy = false;
      }
      if (player.attacking && --player.attackTimer <= 0) player.attacking = false;
      if (player.attackCooldown > 0) player.attackCooldown--;

      // K = ranged attack.
      if (keys["k"] && player.rangedCooldown <= 0) {
        const px = player.facing === 1 ? player.x + player.width : player.x - 18;
        spawnProjectile("player", px, player.y + 28, player.facing);
        player.rangedCooldown = player.rangedCooldownMax;
      }
      if (player.rangedCooldown > 0) player.rangedCooldown--;
      if (invincibleTimer > 0) invincibleTimer--;

      applyPhysics(player);
    }

    function updateEnemyAI() {
      if (enemy.defeated || gameState !== "playing") return;

      const dx = (player.x + player.width / 2) - (enemy.x + enemy.width / 2);
      const dy = (player.y + player.height / 2) - (enemy.y + enemy.height / 2);
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      enemy.facing = dx >= 0 ? 1 : -1;

      // Chase player, but slow down when close enough to attack.
      if (absX > 55) enemy.vx += enemy.speed * enemy.facing;
      else enemy.vx *= 0.75;
      enemy.vx = Math.max(-enemy.maxSpeed, Math.min(enemy.maxSpeed, enemy.vx));

      // Jump if the player is above.
      if (dy < -45 && enemy.onGround) enemy.vy = enemy.jumpPower;

      // Melee when close.
      if (absX < 70 && absY < 60 && enemy.attackCooldown <= 0 && respawnTimer <= 0) {
        enemy.attacking = true;
        enemy.attackTimer = enemy.attackDuration;
        enemy.attackCooldown = enemy.attackCooldownMax;
        enemy.hasHitPlayer = false;
      }
      if (enemy.attacking && --enemy.attackTimer <= 0) enemy.attacking = false;
      if (enemy.attackCooldown > 0) enemy.attackCooldown--;

      // Shoot if far away and roughly lined up.
      if (absX > 170 && absX < 520 && absY < 80 && enemy.rangedCooldown <= 0) {
        const ex = enemy.facing === 1 ? enemy.x + enemy.width : enemy.x - 18;
        spawnProjectile("enemy", ex, enemy.y + 32, enemy.facing);
        enemy.rangedCooldown = enemy.rangedCooldownMax;
      }
      if (enemy.rangedCooldown > 0) enemy.rangedCooldown--;

      enemy.vx *= 0.94;
      applyPhysics(enemy);

      if (enemy.health <= 0) {
        enemy.health = 0;
        enemy.defeated = true;
        gameState = "win";
        message = "Training bot defeated!";
        restartButton.style.display = "inline-block";
      }
    }

    function checkMeleeHits() {
      if (player.attacking && !enemy.defeated) {
        const hitbox = getPlayerMeleeHitbox();
        if (rectanglesOverlap(hitbox, enemy) && !player.hasHitEnemy) {
          enemy.health -= 22;
          enemy.vx = 11 * player.facing;
          enemy.vy = -5;
          player.hasHitEnemy = true;
        }
      }

      if (enemy.attacking && respawnTimer <= 0) {
        const hitbox = getEnemyMeleeHitbox();
        if (rectanglesOverlap(hitbox, player) && !enemy.hasHitPlayer) {
          damagePlayer(16);
          player.vx = 9 * enemy.facing;
          player.vy = -5;
          enemy.hasHitPlayer = true;
        }
      }
    }

    function updateProjectiles() {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.vx;
        if (p.x < -50 || p.x > canvas.width + 50) {
          projectiles.splice(i, 1);
          continue;
        }
        if (p.owner === "player" && !enemy.defeated && rectanglesOverlap(p, enemy)) {
          enemy.health -= p.damage;
          enemy.vx = 8 * Math.sign(p.vx);
          enemy.vy = -3;
          projectiles.splice(i, 1);
          continue;
        }
        if (p.owner === "enemy" && respawnTimer <= 0 && rectanglesOverlap(p, player)) {
          damagePlayer(p.damage);
          projectiles.splice(i, 1);
        }
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#87c7ff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffd166";
      ctx.beginPath(); ctx.arc(790, 80, 35, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#6fcf97";
      ctx.beginPath(); ctx.arc(180, 470, 160, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(600, 470, 220, Math.PI, 0); ctx.fill();
    }

    function drawPlatforms() {
      for (let p of platforms) {
        ctx.fillStyle = "#5b3b22";
        ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.fillStyle = "#3fa34d";
        ctx.fillRect(p.x, p.y, p.width, 6);
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y, p.width, p.height);
      }
    }

    function drawHitboxes() {
      if (player.attacking) {
        const h = getPlayerMeleeHitbox();
        ctx.fillStyle = "rgba(255,255,0,0.55)";
        ctx.fillRect(h.x, h.y, h.width, h.height);
      }
      if (enemy.attacking && !enemy.defeated) {
        const h = getEnemyMeleeHitbox();
        ctx.fillStyle = "rgba(255,80,80,0.45)";
        ctx.fillRect(h.x, h.y, h.width, h.height);
      }
    }

    function drawProjectiles() {
      for (let p of projectiles) {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.strokeStyle = "black";
        ctx.strokeRect(p.x, p.y, p.width, p.height);
      }
    }

    function drawLoadingScreen() {
      drawBackground();
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";
      ctx.font = "42px Arial";
      ctx.fillText("Loading Arena...", 295, 210);
      const barWidth = 360;
      const fillWidth = ((110 - loadingTimer) / 110) * barWidth;
      ctx.fillStyle = "#333";
      ctx.fillRect(270, 245, barWidth, 28);
      ctx.fillStyle = "#00f5d4";
      ctx.fillRect(270, 245, fillWidth, 28);
      ctx.strokeStyle = "white";
      ctx.lineWidth = 3;
      ctx.strokeRect(270, 245, barWidth, 28);
      ctx.font = "18px Arial";
      ctx.fillText("Tip: J is melee. K is ranged.", 337, 305);
    }

    function draw() {
      if (gameState === "loading") {
        drawLoadingScreen();
        return;
      }

      drawBackground();
      drawPlatforms();
      drawHitboxes();
      drawProjectiles();

      if (respawnTimer <= 0) drawRect(player);
      if (!enemy.defeated) drawRect(enemy);

      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      if (respawnTimer <= 0) ctx.fillText(player.facing === 1 ? ">" : "<", player.x + 14, player.y + 35);
      if (!enemy.defeated) ctx.fillText(enemy.facing === 1 ? ">" : "<", enemy.x + 16, enemy.y + 38);

      drawHealthBar(30, 35, 250, 22, player.health, player.maxHealth, "Player");
      drawHealthBar(620, 35, 250, 22, enemy.health, enemy.maxHealth, "Enemy");

      ctx.font = "18px Arial";
      ctx.fillText("Lives: " + playerLives, 30, 90);
      if (invincibleTimer > 0) ctx.fillText("Respawn shield!", 30, 115);

      if (respawnTimer > 0 && playerLives > 0) {
        ctx.font = "34px Arial";
        ctx.fillText("Respawning...", 350, 210);
      }

      if (gameState === "win" || gameState === "lose") {
        ctx.font = "34px Arial";
        ctx.fillText(message, 285, 210);
      }

      ctx.fillStyle = "black";
      ctx.font = "16px Arial";
      ctx.fillText("A/D move | W jump | J melee | K ranged | Enemy now fights back!", 215, 485);
    }

    function gameLoop() {
      if (gameState === "loading") {
        loadingTimer--;
        if (loadingTimer <= 0) gameState = "playing";
        draw();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === "playing") {
        updateRespawn();
        updatePlayer();
        updateEnemyAI();
        checkMeleeHits();
        updateProjectiles();
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function restartGame() {
      gameState = "loading";
      loadingTimer = 70;
      message = "";
      playerLives = 3;
      respawnTimer = 0;
      invincibleTimer = 0;

      player.x = 100; player.y = 350; player.vx = 0; player.vy = 0;
      player.health = player.maxHealth; player.facing = 1;
      player.attacking = false; player.attackCooldown = 0; player.rangedCooldown = 0;

      enemy.x = 690; enemy.y = 350; enemy.vx = 0; enemy.vy = 0;
      enemy.health = enemy.maxHealth; enemy.defeated = false; enemy.facing = -1;
      enemy.attacking = false; enemy.attackCooldown = 0; enemy.rangedCooldown = 0;

      projectiles.length = 0;
      restartButton.style.display = "none";
    }

    restartButton.addEventListener("click", restartGame);
    gameLoop();
  </script>
</body>
</html>
