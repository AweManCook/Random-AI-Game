<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Platform Fighter V5.5.1 Stable</title><style>body{margin:0;background:#171b22;color:white;font-family:Arial;text-align:center}canvas{display:block;margin:auto;border:4px solid #202033;background:#cdefff;image-rendering:pixelated}button{display:none;margin:10px;padding:10px}</style></head><body><h1>Platform Fighter V5.5.1 Stable</h1><p>1-6 select | A/D move | W jump | J attack | U special | K shot/hold | R utility | E interact</p><canvas id="gameCanvas" width="900" height="500"></canvas><button id="restartButton">Restart</button><script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),restartButton=document.getElementById('restartButton');
const keys={};let state='select',pick='basic',cam=0,tick=0,msg='',msgTimer=0,hasKey=false,kills=0,lastK=false,shots=[],particles=[],inv=0,fly=0,slow=0,charge=0;
const staffImg=new Image();staffImg.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAABF0lEQVR4AeyTMQrCQBBFN9ZioWBlJR7AE3gKKy/gmfQAVp7CE3gASytBC7GPPHEkLAbzZxckkMBnskt2/pvZTC/8+UkGKA+DMqWGJAAzt+gBcQOkmFZBXQBmXizuBcks8q5KBojNVcP4ewkgNr9OZuVtNQ7EOHHTtQRgSQFBrPfnPsEtGYD7NuG6nDwIbskAmzD/zP3ofCqGu0sgegkkACrHqArBOkUSQNWIfwCxZ5F3VRKAVb4Ox9f8h/djnXkvpSABkDmnOfkaA1B9bnMJIDbfLqacT1bjDiQ71SToANrZASai5krl7XZ2gDLjsWTPo/Z2wFPttzNdB+QO5BxBrkQG4FBOuQByjSCFuAA4mEsygFr9L9AnAAAA///S23ENAAAABklEQVQDAJevUUHmqrU9AAAAAElFTkSuQmCC';
window.addEventListener('keydown',function(e){let k=e.key.toLowerCase();keys[k]=true;if(state==='select'&&'123456'.includes(k)){pick=['basic','burst','mage','rubber','ki','aura'][Number(k)-1];state='play';say(builds[pick].name+' selected');burst(450,250,builds[pick].fx,40);}});
window.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
const builds={
 basic:{name:'Basic Fighter',color:'#4d7fd6',fx:'#005f73',j:'Slash',u:'Guard Burst',r:'Shield',melee:22,special:15,shot:12,beam:4,canBeam:true},
 burst:{name:'Burst Striker',color:'#d94f70',fx:'#8f2d56',j:'Heavy Cleave',u:'Ground Slam',r:'Dash',melee:32,special:24,shot:19,beam:6,canBeam:true},
 mage:{name:'Thousand-Year Mage',color:'#7c5dc7',fx:'#553c9a',j:'Staff Stab',u:'Auto Aim Chain',r:'Float',melee:18,special:16.5,shot:5,beam:3,canBeam:true,auto:true},
 rubber:{name:'Rubber Pirate',color:'#d95d69',fx:'#9f1239',j:'Stretch Punch',u:'Elastic Slam',r:'Observation Dodge',melee:20,special:18,shot:10,beam:0,canBeam:false},
 ki:{name:'Ki Warrior',color:'#d97706',fx:'#92400e',j:'Meteor Kick',u:'Ki Flare',r:'Power Charge',melee:25,special:20,shot:17,beam:5,canBeam:true},
 aura:{name:'Aura Hunter',color:'#2b8f86',fx:'#581c87',j:'Quick Claw',u:'Aura Snare',r:'Slow Field',melee:21,special:24,shot:9,beam:0,canBeam:false,auto:true}
};
const levelPlats=[{x:0,y:450,w:3800,h:50},{x:220,y:330,w:250,h:22},{x:620,y:270,w:240,h:22},{x:1050,y:350,w:270,h:22},{x:1480,y:300,w:260,h:22},{x:1880,y:240,w:250,h:22},{x:2260,y:350,w:280,h:22},{x:2700,y:295,w:260,h:22},{x:3180,y:340,w:270,h:22}];
const arenaPlats=[{x:2920,y:450,w:950,h:50},{x:3030,y:335,w:230,h:22},{x:3320,y:292,w:250,h:22},{x:3600,y:350,w:190,h:22}];
const npc={x:1880,y:178,w:42,h:62},door={x:3400,y:330,w:70,h:120};
let player={x:80,y:350,w:40,h:60,vx:0,vy:0,f:1,on:false,hp:140,en:100,atk:0,sp:0,rCD:0,shotCD:0,hold:0,beam:false};
let boss={x:3420,y:250,w:70,h:92,vx:0,vy:0,hp:380,maxHp:380,on:false,live:false,dead:false};
let enemies=[];
function makeEnemy(x,y,type){let fast=type==='fast',tank=type==='tank';return{x:x,y:y,w:tank?55:42,h:tank?72:62,vx:0,vy:0,hp:tank?82:fast?32:48,dead:false,color:tank?'#9b4d4d':fast?'#c26f20':'#c45454'};}
function spawnEnemies(){enemies=[makeEnemy(520,350),makeEnemy(860,200,'fast'),makeEnemy(1240,350),makeEnemy(1640,230,'tank'),makeEnemy(2050,180,'fast'),makeEnemy(2420,350),makeEnemy(2860,230,'tank'),makeEnemy(3140,270,'fast')];}
function currentPlats(){return boss.live?arenaPlats:levelPlats;}
function sx(x){return x-cam;}
function rects(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function say(s){msg=s;msgTimer=120;}
function drawText(s,x,y,size,color){ctx.save();ctx.font=size+'px Arial';ctx.lineWidth=4;ctx.strokeStyle='rgba(255,255,255,.85)';ctx.strokeText(s,x,y);ctx.fillStyle=color||'#111827';ctx.fillText(s,x,y);ctx.restore();}
function burst(x,y,color,n){for(let i=0;i<n;i++)particles.push({x:x,y:y,vx:(Math.random()-.5)*5,vy:(Math.random()-.8)*5,life:18+Math.random()*22,size:2+Math.random()*5,color:color});}
function physics(o){o.vy+=((fly>0&&o===player)?0.25:0.72);o.x+=o.vx;o.y+=o.vy;o.on=false;o.x=clamp(o.x,0,3790-o.w);for(const p of currentPlats()){if(rects(o,p)&&o.vy>=0){o.y=p.y-o.h;o.vy=0;o.on=true;}}
 if(o.y>700){if(o===player){player.hp-=25;if(boss.live){player.x=3060;player.y=240;cam=2900;}else{player.x=80;player.y=200;}player.vx=0;player.vy=0;burst(player.x+20,player.y+30,'#111827',20);}else if(o===boss){boss.x=3420;boss.y=250;boss.vx=0;boss.vy=0;burst(boss.x+35,boss.y+45,'#581c87',20);}else{o.x-=100;o.y=200;o.vx=0;o.vy=0;}}}
function nearestTarget(){let arr=enemies.filter(e=>!e.dead);if(boss.live&&!boss.dead)arr.push(boss);if(arr.length===0)return null;arr.sort((a,b)=>Math.abs((a.x+a.w/2)-(player.x+20))-Math.abs((b.x+b.w/2)-(player.x+20)));return arr[0];}
function damage(o,amt){let b=builds[pick];o.hp-=amt;o.vx=(o.x<player.x?-1:1)*6;burst(o.x+o.w/2,o.y+o.h/2,b.fx,15);if(o!==boss&&o.hp<=0&&!o.dead){o.dead=true;kills++;burst(o.x+o.w/2,o.y+o.h/2,'#111827',25);}if(o===boss&&o.hp<=0&&!boss.dead){boss.dead=true;state='win';restartButton.style.display='inline-block';}}
function jBox(){if(pick==='mage')return{x:player.f>0?player.x+70:player.x-130,y:player.y+12,w:110,h:34};if(pick==='rubber')return{x:player.f>0?player.x+player.w:player.x-150,y:player.y+10,w:150,h:42};return{x:player.f>0?player.x+player.w:player.x-72,y:player.y+10,w:72,h:45};}
function uBoxes(){let b=builds[pick],q=nearestTarget();if(pick==='mage'&&q){let cx=player.x+20,cy=player.y+28,tx=q.x+q.w/2,ty=q.y+q.h/2;let x=Math.min(cx,tx),y=Math.min(cy,ty)-10,w=Math.max(20,Math.abs(tx-cx));return[{x:q.x-14,y:q.y-14,w:q.w+28,h:q.h+28,chain:false},{x:x,y:y,w:w,h:20,chain:true}];}if(b.auto&&q)return[{x:q.x-18,y:q.y-18,w:q.w+36,h:q.h+36,chain:false}];if(pick==='burst')return[{x:player.x-80,y:player.y+20,w:player.w+160,h:70,chain:false}];if(pick==='rubber')return[{x:player.x-95,y:player.y-20,w:player.w+190,h:player.h+45,chain:false}];return[{x:player.x-55,y:player.y-35,w:player.w+110,h:player.h+70,chain:false}];}
function beamBox(){let b=builds[pick];return{x:player.f>0?player.x+player.w:player.x-720,y:player.y+28-b.beam*4,w:720,h:Math.max(24,b.beam*12)};}
function shoot(){let b=builds[pick];let sp=pick==='ki'?15:12,sz=pick==='burst'?26:16;shots.push({x:player.f>0?player.x+player.w:player.x-16,y:player.y+30,w:sz,h:10,vx:player.f*sp,damage:b.shot+(pick==='ki'?charge:0),color:b.fx});burst(player.x+20,player.y+30,b.fx,8);}
function utility(){let b=builds[pick];if(player.rCD>0)return;player.rCD=160;if(pick==='rubber'){inv=90;say('Observation dodge.');burst(player.x,player.y,b.fx,25);}else if(pick==='mage'){fly=150;say('Float online.');burst(player.x,player.y,b.fx,25);}else if(pick==='ki'){charge=10;player.en=Math.min(100,player.en+45);say('Power charged.');burst(player.x,player.y,b.fx,35);}else if(pick==='aura'){slow=180;say('Aura slow field.');burst(player.x,player.y,b.fx,30);}else if(pick==='burst'){player.vx=player.f*18;player.vy=-4;say('Dash burst.');burst(player.x,player.y,b.fx,20);}else{inv=80;say('Shield guard.');burst(player.x,player.y,b.fx,20);}}
function update(){tick++;let b=builds[pick];if(inv>0)inv--;if(fly>0)fly--;if(slow>0)slow--;if(player.rCD>0)player.rCD--;if(keys.a){player.vx-=1.15;player.f=-1;}if(keys.d){player.vx+=1.15;player.f=1;}player.vx=clamp(player.vx,-8,8)*.84;if(keys.w&&player.on){player.vy=-14;player.on=false;burst(player.x+20,player.y+60,'#374151',8);}if(keys.r)utility();if(keys.j&&player.atk<=0)player.atk=12;if(keys.u&&player.sp<=0){player.sp=18;burst(player.x+20,player.y+30,b.fx,16);}if(keys.k){player.hold++;if(player.hold>24&&b.canBeam&&player.en>0){player.beam=true;player.en-=.65;if(tick%4===0)burst(player.x+20,player.y+30,b.fx,3);}else if(player.hold>24&&!b.canBeam){if(pick==='rubber'){let q=nearestTarget();if(q&&Math.abs(q.x-player.x)<230&&tick%12===0){q.vx+=(q.x<player.x?-1:1)*9;burst(q.x,q.y,b.fx,8);}say('Pressure aura: pushes, no damage.');}else say('No beam on this build.');}}else{if(lastK&&player.hold>0&&player.hold<=24&&player.shotCD<=0){shoot();player.shotCD=24;}player.hold=0;player.beam=false;}lastK=keys.k;if(player.atk>0)player.atk--;if(player.sp>0)player.sp--;if(player.shotCD>0)player.shotCD--;if(!player.beam&&player.en<100)player.en+=.4;physics(player);
 if(player.atk===11){let hb=jBox();burst(hb.x+hb.w/2,hb.y+hb.h/2,b.fx,10);for(const e of enemies)if(!e.dead&&rects(hb,e))damage(e,b.melee);if(boss.live&&!boss.dead&&rects(hb,boss))damage(boss,b.melee);}
 if(player.sp===17){for(const hb of uBoxes()){burst(hb.x+hb.w/2,hb.y+hb.h/2,b.fx,hb.chain?6:12);for(const e of enemies)if(!e.dead&&rects(hb,e))damage(e,hb.chain?b.special*.45:b.special);if(boss.live&&!boss.dead&&rects(hb,boss))damage(boss,hb.chain?b.special*.45:b.special);}}
 if(player.beam&&tick%6===0){let hb=beamBox();for(const e of enemies)if(!e.dead&&rects(hb,e))damage(e,b.beam);if(boss.live&&!boss.dead&&rects(hb,boss))damage(boss,b.beam);}
 for(let i=shots.length-1;i>=0;i--){let s=shots[i];s.x+=s.vx;burst(s.x,s.y,s.color,1);let gone=false;for(const e of enemies)if(!e.dead&&rects(s,e)){damage(e,s.damage);gone=true;}if(boss.live&&!boss.dead&&rects(s,boss)){damage(boss,s.damage);gone=true;}if(gone||s.x<cam-120||s.x>cam+1020)shots.splice(i,1);}
 let speedMod=slow>0?.35:1;if(!boss.live){for(const e of enemies){if(e.dead)continue;let dx=player.x-e.x;e.vx+=Math.sign(dx)*.25*speedMod;e.vx=clamp(e.vx,-3,3)*.92;if(Math.abs(dx)<55&&tick%55===0&&inv<=0){player.hp-=8;burst(player.x,player.y,'#991b1b',8);}physics(e);}}else{let dx=player.x-boss.x;boss.vx+=Math.sign(dx)*.22;boss.vx=clamp(boss.vx,-3.5,3.5)*.92;if(Math.abs(dx)<78&&tick%50===0&&inv<=0){player.hp-=14;burst(player.x,player.y,'#991b1b',12);}physics(boss);}
 if(!boss.live&&Math.abs(player.x-npc.x)<100){if(kills>=3){say('Guide: press E for key');if(keys.e){keys.e=false;hasKey=true;say('Key obtained. Clear all enemies.');}}else say('Guide: defeat 3 first '+kills+'/3');}
 if(!boss.live&&Math.abs(player.x-door.x)<130){if(!hasKey)say('Door locked. Find guide.');else if(enemies.some(e=>!e.dead))say('Clear remaining enemies.');else if(keys.e){keys.e=false;boss.live=true;boss.dead=false;boss.hp=boss.maxHp;boss.x=3420;boss.y=250;boss.vx=0;boss.vy=0;player.x=3060;player.y=240;player.vx=0;player.vy=0;cam=2900;say('Boss arena entered.');}}
 if(player.hp<=0){state='lose';restartButton.style.display='inline-block';}
 for(let i=particles.length-1;i>=0;i--){let q=particles[i];q.x+=q.vx;q.y+=q.vy;q.vy+=.14;q.life--;if(q.life<=0)particles.splice(i,1);}cam+=(clamp((boss.live?3300:player.x)-450,0,2920)-cam)*.1;if(msgTimer>0)msgTimer--;}
function bg(){let grd=ctx.createLinearGradient(0,0,0,500);grd.addColorStop(0,boss.live?'#b7dce8':'#cdefff');grd.addColorStop(1,'#ffe9d6');ctx.fillStyle=grd;ctx.fillRect(0,0,900,500);ctx.fillStyle='#b7d9c4';for(let x=-200;x<3900;x+=520){ctx.beginPath();ctx.arc(sx(x),470,180,Math.PI,0);ctx.fill();}}
function rect(o,color){ctx.fillStyle=color;ctx.fillRect(sx(o.x),o.y,o.w,o.h);ctx.strokeStyle='#111827';ctx.strokeRect(sx(o.x),o.y,o.w,o.h);}
function drawParticles(){for(const q of particles){ctx.globalAlpha=Math.max(0,q.life/35);ctx.fillStyle=q.color;ctx.beginPath();ctx.arc(sx(q.x),q.y,q.size,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
function drawSelect(){bg();ctx.fillStyle='rgba(25,24,45,.74)';ctx.fillRect(0,0,900,500);drawText('Choose Character',318,55,32);let arr=['basic','burst','mage','rubber','ki','aura'];for(let i=0;i<arr.length;i++){let k=arr[i],b=builds[k],x=55+(i%3)*280,y=90+Math.floor(i/3)*185;ctx.fillStyle='rgba(255,255,255,.83)';ctx.fillRect(x,y,235,150);ctx.strokeStyle=b.fx;ctx.lineWidth=4;ctx.strokeRect(x,y,235,150);ctx.fillStyle=b.color;ctx.fillRect(x+18,y+34,34,54);if(k==='mage')ctx.drawImage(staffImg,x+42,y+26,48,48);drawText((i+1)+'. '+b.name,x+18,y+24,18);drawText('J: '+b.j,x+18,y+93,13);drawText('U: '+b.u,x+18,y+113,13);drawText('R: '+b.r,x+18,y+133,13);drawText(b.canBeam?'K: shot / hold beam':'K: shot / hold utility',x+18,y+150,12);}drawText('Press 1-6',390,470,18);}
function draw(){bg();if(state==='select'){drawSelect();return;}for(const q of currentPlats()){ctx.fillStyle='#c59b72';ctx.fillRect(sx(q.x),q.y,q.w,q.h);ctx.fillStyle='#689f7d';ctx.fillRect(sx(q.x),q.y,q.w,7);}if(!boss.live){rect(npc,hasKey?'#9ca3af':'#c0841a');rect(door,hasKey&&!enemies.some(e=>!e.dead)?'#168987':'#8a5a44');}let b=builds[pick];if(player.atk>0){let hb=jBox();ctx.fillStyle='rgba(110,80,0,.42)';ctx.fillRect(sx(hb.x),hb.y,hb.w,hb.h);}if(player.sp>0){for(const hb of uBoxes()){ctx.fillStyle=hb.chain?'rgba(70,30,120,.55)':'rgba(30,70,90,.44)';ctx.fillRect(sx(hb.x),hb.y,hb.w,hb.h);}}if(player.beam){let hb=beamBox();ctx.globalAlpha=.40;ctx.fillStyle=b.fx;ctx.fillRect(sx(hb.x),hb.y,hb.w,hb.h);ctx.globalAlpha=1;ctx.fillStyle='#111827';ctx.fillRect(sx(hb.x),hb.y+hb.h/2-4,hb.w,8);}drawParticles();for(const s of shots)rect(s,s.color);for(const e of enemies)if(!e.dead)rect(e,e.color);if(boss.live&&!boss.dead)rect(boss,'#7e22ce');rect(player,b.color);if(pick==='mage')ctx.drawImage(staffImg,sx(player.x)+(player.f>0?22:-28),player.y-5,48,48);if(inv>0){ctx.strokeStyle='#111827';ctx.lineWidth=3;ctx.strokeRect(sx(player.x)-5,player.y-5,player.w+10,player.h+10);}drawText('HP '+Math.floor(player.hp),25,35);drawText('EN '+Math.floor(player.en),25,60);drawText(b.name,25,85);drawText('R CD '+Math.ceil(player.rCD/60),25,110);if(boss.live)drawText('Boss '+Math.floor(boss.hp),560,35);else drawText('Defeated '+kills+' Left '+enemies.filter(e=>!e.dead).length,560,35);if(msgTimer>0){ctx.fillStyle='rgba(255,255,255,.88)';ctx.fillRect(240,90,430,45);drawText(msg,260,118);}if(state==='win'||state==='lose'){ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,900,500);drawText(state==='win'?'YOU WIN':'YOU LOSE',340,230,42,'white');}}
function loop(){if(state==='play')update();draw();requestAnimationFrame(loop);}restartButton.onclick=function(){location.reload();};spawnEnemies();loop();
</script></body></html>
