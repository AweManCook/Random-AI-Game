function drawBossSky(){let gr=ctx.createRadialGradient(450,170,40,450,170,620);gr.addColorStop(0,"#264a7a");gr.addColorStop(.38,"#17132e");gr.addColorStop(1,"#090719");ctx.fillStyle=gr;ctx.fillRect(0,0,900,500);ctx.strokeStyle="rgba(125,230,255,.35)";ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(450,355,330,74,0,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1;for(let i=0;i<5;i++){ctx.beginPath();ctx.ellipse(450,355,260+i*22,50+i*8,0,0,Math.PI*2);ctx.strokeStyle="rgba(168,245,255,.18)";ctx.stroke()}for(let i=0;i<9;i++){let x=80+i*100;ctx.fillStyle="rgba(120,220,255,.10)";ctx.fillRect(x,0,18,420);ctx.fillStyle="rgba(255,255,255,.12)";ctx.beginPath();ctx.arc(x+8,100+Math.sin(t/30+i)*30,38,0,Math.PI*2);ctx.fill()}ctx.fillStyle="rgba(20,18,45,.95)";for(let i=0;i<6;i++){let x=40+i*165;ctx.fillRect(x,250-(i%2)*35,35,150+(i%3)*35)}ctx.fillStyle="rgba(45,26,86,.55)";ctx.fillRect(0,390,900,90)}
