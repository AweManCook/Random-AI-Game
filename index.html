 basic:{name:"Basic Fighter",color:"#4d7fd6",fx:"#22d3ee",hair:"#1e3a8a",hairStyle:"short",j:"Slash",u:"Guard Burst",r:"Shield",awk:"Hero Mode",melee:18,special:16,shot:10,beam:3,cost:.65,canBeam:true},

function newP(x,id,label){return{x:x,y:350,w:38,h:58,vx:0,vy:0,f:1,on:false,hp:140,en:100,awk:100,awaken:false,awkT:0,atk:0,sp:0,rCD:0,shotCD:0,hold:0,beam:false,beamLock:false,id:id,label:label,anim:"idle",animT:0};}

let enemies=[];
function makeE(x,y,type="grunt"){let tank=type==="tank",fast=type==="fast";return{x:x,y:y,w:tank?55:42,h:tank?72:62,vx:0,vy:0,hp:tank?85:fast?35:50,c:tank?"#9b4d4d":fast?"#f59e0b":"#c45454",dead:false};}
function spawn(){enemies=[makeE(520,350),makeE(860,200,"fast"),makeE(1240,350),makeE(1640,230,"tank"),makeE(2050,180,"fast"),makeE(2420,350),makeE(2860,230,"tank"),makeE(3140,270,"fast")];}
function plats(){return boss.live?arena:level}
function sx(x){return x-cam}
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function say(s){msg=s;msgT=120}
function text(s,x,y,z=14,col="#111827"){ctx.save();ctx.font=z+"px Arial";ctx.lineWidth=4;ctx.strokeStyle="rgba(255,255,255,.92)";ctx.strokeText(s,x,y);ctx.fillStyle=col;ctx.fillText(s,x,y);ctx.restore()}
function burst(x,y,c,n=20){for(let i=0;i<n;i++)particles.push({x:x,y:y,vx:(Math.random()-.5)*6,vy:(Math.random()-.7)*6,life:18+Math.random()*26,s:2+Math.random()*5,c:c});}
function addEffect(type,x,y,w,h,c,life=16,extra={}){effects.push(Object.assign({type,x,y,w,h,c,life,max:life},extra));}
window.addEventListener("keydown",e=>{let k=e.key.toLowerCase();keys[k]=true;if(state==="select"){if(k==="c"){coop=!coop;say("Co-op "+(coop?"ON":"OFF"));}if("12345678".includes(k)){pick=ids[+k-1];p1.id=pick;state="play";say(chars[pick].name+" selected"+(coop?" + P2":""));burst(450,240,chars[pick].fx,80);}}});
window.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false});
function physics(o){o.vy+=.72;o.x+=o.vx;o.y+=o.vy;o.on=false;o.x=clamp(o.x,0,3790-o.w);for(const q of plats()) if(hit(o,q)&&o.vy>=0){o.y=q.y-o.h;o.vy=0;o.on=true;}if(o.y>700){if(o===p1||o===p2){o.hp-=20;o.x=o===p1?(boss.live?3060:80):(boss.live?3130:135);o.y=boss.live?330:200;o.vx=o.vy=0;if(boss.live)cam=2900;burst(o.x,o.y,"#111827",20);}else if(o===boss){boss.x=3420;boss.y=250;boss.vx=boss.vy=0;}else{o.x-=100;o.y=200;o.vx=o.vy=0;}}}
function nearest(from){let arr=enemies.filter(e=>!e.dead);if(boss.live&&!boss.dead)arr.push(boss);if(!arr.length)return null;arr.sort((a,b)=>Math.abs((a.x+a.w/2)-(from.x+20))-Math.abs((b.x+b.w/2)-(from.x+20)));return arr[0];}
function damage(o,amt,from,fx){o.hp-=amt;o.vx=(o.x<from.x?-1:1)*5;burst(o.x+o.w/2,o.y+o.h/2,fx,18);if(o!==boss&&o.hp<=0&&!o.dead){o.dead=true;kills++;burst(o.x+o.w/2,o.y+o.h/2,"#111827",30)}if(o===boss&&o.hp<=0&&!boss.dead){boss.dead=true;state="win";btn.style.display="inline-block"}}
function meleeBox(pl,c){if(c.granite)return{x:pl.f>0?pl.x+pl.w:pl.x-102,y:pl.y+2,w:102,h:54};if(c.stretch)return{x:pl.f>0?pl.x+pl.w:pl.x-158,y:pl.y+10,w:158,h:42};if(c.staff)return{x:pl.f>0?pl.x+pl.w:pl.x-104,y:pl.y+2,w:104,h:48};return{x:pl.f>0?pl.x+pl.w:pl.x-78,y:pl.y+8,w:78,h:48};}
function specialBox(pl,c){let q=nearest(pl);if((c.auto||c.granite)&&q)return{x:q.x-42,y:q.y-42,w:q.w+84,h:q.h+84};return{x:pl.x-68,y:pl.y-40,w:pl.w+136,h:pl.h+80};}
function beamBox(pl,c){return{x:pl.f>0?pl.x+pl.w:pl.x-780,y:pl.y+24-(c.beam||4)*3,w:780,h:Math.max(28,(c.beam||4)*11)}}
function shoot(pl,c,owner){let big=c.granite,spd=big?16:12;shots.push({x:pl.f>0?pl.x+pl.w:pl.x-24,y:pl.y+28,w:big?36:16,h:big?20:10,vx:pl.f*spd,vy:0,d:c.shot+(pl.awaken?8:0),c:big?"#ff7ac7":c.fx,owner:owner,big:big,trail:[]});pl.anim="shoot";pl.animT=12;burst(pl.x+20,pl.y+30,c.fx,12);}
function awakening(pl,c){if(pl.awk<100||pl.awaken)return;pl.awk=0;pl.awaken=true;pl.awkT=520;pl.hp=Math.min(160,pl.hp+25);pl.en=100;pl.anim="awk";pl.animT=40;shake=12;say(pl.label+" AWK: "+c.awk);burst(pl.x+20,pl.y+30,c.fx,100);addEffect("awakening",pl.x-45,pl.y-70,130,150,c.fx,45,{target:pl});}
function utility(pl,c){if(pl.rCD>0)return;pl.rCD=150;pl.anim="utility";pl.animT=20;if(c.granite){pl.en=Math.min(100,pl.en+35);pl.awk=Math.min(100,pl.awk+18);say("Sugar Rush: output rising");}else if(c.name==="Ki Warrior"){pl.en=Math.min(100,pl.en+45);say("Ki charged");}else if(c.name==="Cursed Brawler"){pl.hp=Math.min(155,pl.hp+20);say("Reverse flow");}else if(c.name==="Burst Striker"){pl.vx=pl.f*18;pl.vy=-4;say("Dash burst");}else say(c.r);burst(pl.x+20,pl.y+30,c.fx,35);addEffect("ring",pl.x-35,pl.y-35,pl.w+70,pl.h+70,c.fx,22);}
function updatePlayer(pl,ctrl,c,owner){if(ctrl.left()){pl.vx-=1.1;pl.f=-1}if(ctrl.right()){pl.vx+=1.1;pl.f=1}pl.vx=clamp(pl.vx,-8,8)*.84;if(ctrl.jump()&&pl.on){pl.vy=-14;pl.on=false;burst(pl.x+20,pl.y+55,"#94a3b8",10)}if(ctrl.awk())awakening(pl,c);if(ctrl.r())utility(pl,c);if(ctrl.j()&&pl.atk<=0){pl.atk=12;pl.anim="melee";pl.animT=14}if(ctrl.u()&&pl.sp<=0){pl.sp=18;pl.anim="special";pl.animT=18}let k=ctrl.k(),last=owner==="p1"?lastK:lastP;if(k){pl.hold++;if(pl.hold>24&&c.canBeam){if(!pl.beamLock&&pl.en>=c.cost){pl.beam=true;pl.en=Math.max(0,pl.en-c.cost);shake=Math.max(shake,c.granite?7:4);pl.anim="beam";pl.animT=8;if(pl.en<=0){pl.beam=false;pl.beamLock=true;say("Beam drained. Release key.")}if(tick%4===0)burst(pl.x+20,pl.y+30,c.fx,5)}else pl.beam=false}else if(pl.hold>24&&!c.canBeam)pl.beam=false}else{if(last&&pl.hold>0&&pl.hold<=24&&pl.shotCD<=0){shoot(pl,c,owner);pl.shotCD=24}pl.hold=0;pl.beam=false;pl.beamLock=false}if(owner==="p1")lastK=k;else lastP=k;if(pl.atk>0)pl.atk--;if(pl.sp>0)pl.sp--;if(pl.shotCD>0)pl.shotCD--;if(pl.rCD>0)pl.rCD--;if(pl.animT>0)pl.animT--;else if(pl.anim!=="idle")pl.anim="idle";if(!pl.beam&&pl.en<100)pl.en+=.45;if(pl.awaken){pl.awkT--;if(pl.awkT<=0)pl.awaken=false}else if(pl.awk<100)pl.awk+=.06;physics(pl);}
const p1c={left:()=>keys.a,right:()=>keys.d,jump:()=>keys.w,j:()=>keys.j,u:()=>keys.u,k:()=>keys.k,r:()=>keys.r,awk:()=>keys.t};
const p2c={left:()=>keys.arrowleft,right:()=>keys.arrowright,jump:()=>keys.arrowup,j:()=>keys.i,u:()=>keys.o,k:()=>keys.p,r:()=>keys.l,awk:()=>keys.m};
function applyPlayer(pl,c){let mult=pl.awaken?1.45:1;if(pl.atk===11){let box=meleeBox(pl,c);addEffect(c.granite?"pompadour":c.staff?"staff":"slash",box.x,box.y,box.w,box.h,c.fx,14,{f:pl.f});for(const e of enemies)if(!e.dead&&hit(box,e))damage(e,c.melee*mult,pl,c.fx);if(boss.live&&!boss.dead&&hit(box,boss))damage(boss,c.melee*mult,pl,c.fx)}if(pl.sp===17){let box=specialBox(pl,c);addEffect(c.granite?"output":c.staff?"magicCircle":"burst",box.x,box.y,box.w,box.h,c.fx,24,{f:pl.f});for(const e of enemies)if(!e.dead&&hit(box,e))damage(e,c.special*mult,pl,c.fx);if(boss.live&&!boss.dead&&hit(box,boss))damage(boss,c.special*mult,pl,c.fx)}if(pl.beam&&tick%6===0){let box=beamBox(pl,c);addEffect(c.granite?"graniteCannon":"beam",box.x,box.y,box.w,box.h,c.fx,8,{f:pl.f});for(const e of enemies)if(!e.dead&&hit(box,e))damage(e,(c.beam+(c.granite?4:0))*mult,pl,c.fx);if(boss.live&&!boss.dead&&hit(box,boss))damage(boss,(c.beam+(c.granite?4:0))*mult,pl,c.fx)}}
function useBossMove(n){boss.move=n;boss.moveT=0;boss.cd=150;shake=7;say("Boss: "+n);burst(boss.x+boss.w/2,boss.y+boss.h/2,"#7c3aed",35)}
function updateBoss(){if(!boss.live||boss.dead)return;boss.moveT++;if(boss.cd>0)boss.cd--;let target=coop&&p2.hp>0&&Math.random()<.45?p2:p1,dx=target.x-boss.x;boss.f=dx>0?1:-1;if(boss.move==="dash"){boss.vx=boss.f*6;if(boss.moveT>24)boss.move=""}else if(boss.move==="slam"){boss.vx*=.7;if(boss.moveT===38){hazards.push({x:boss.x-210,y:410,w:500,h:40,t:32,d:14,c:"#4c1d95"});shake=10;burst(boss.x+boss.w/2,420,"#4c1d95",45)}if(boss.moveT>58)boss.move=""}else if(boss.move==="orbs"){boss.vx*=.8;if(boss.moveT%24===0)for(let i=0;i<3;i++)shots.push({x:3050+i*260+Math.random()*60,y:150,w:18,h:18,vx:0,vy:4,d:9,c:"#a855f7",owner:"boss",trail:[]});if(boss.moveT>90)boss.move=""}else if(boss.move==="laser"){boss.vx*=.8;if(boss.moveT>30&&boss.moveT<62){hazards.push({x:boss.f>0?boss.x+boss.w:boss.x-470,y:boss.y+35,w:470,h:22,t:4,d:6,c:"#111827"});if(boss.moveT%10===0)shake=5}if(boss.moveT>75)boss.move=""}else{boss.vx+=Math.sign(dx)*.14;boss.vx=clamp(boss.vx,-2.6,2.6);if(boss.cd<=0){let r=Math.random();useBossMove(r<.25?"dash":r<.5?"slam":r<.75?"orbs":"laser")}}physics(boss);for(const pl of [p1,coop?p2:null])if(pl&&hit(boss,pl)){pl.hp-=7;pl.vx=boss.f*6;burst(pl.x,pl.y,"#991b1b",8)}}
function update(){tick++;let c=chars[pick],c2=chars.basic;if(shake>0)shake*=.82;updatePlayer(p1,p1c,c,"p1");if(coop)updatePlayer(p2,p2c,c2,"p2");applyPlayer(p1,c);if(coop)applyPlayer(p2,c2);for(let i=shots.length-1;i>=0;i--){let s=shots[i];s.trail=s.trail||[];s.trail.push({x:s.x,y:s.y});if(s.trail.length>8)s.trail.shift();s.x+=s.vx;s.y+=(s.vy||0);let gone=false;if(s.owner==="boss"){for(const pl of [p1,coop?p2:null])if(pl&&hit(s,pl)){pl.hp-=s.d;gone=true;burst(pl.x,pl.y,"#991b1b",10)}}else{for(const e of enemies)if(!e.dead&&hit(s,e)){damage(e,s.d,s.owner==="p2"?p2:p1,s.c);gone=true}if(boss.live&&!boss.dead&&hit(s,boss)){damage(boss,s.d,s.owner==="p2"?p2:p1,s.c);gone=true}}if(gone||s.x<cam-150||s.x>cam+1050||s.y>520)shots.splice(i,1)}for(let i=hazards.length-1;i>=0;i--){let h=hazards[i];h.t--;for(const pl of [p1,coop?p2:null])if(pl&&hit(h,pl)){pl.hp-=h.d;burst(pl.x,pl.y,"#991b1b",12)}if(h.t<=0)hazards.splice(i,1)}for(let i=effects.length-1;i>=0;i--){effects[i].life--;if(effects[i].life<=0)effects.splice(i,1)}if(!boss.live){for(const e of enemies){if(e.dead)continue;let target=coop&&Math.random()<.4?p2:p1,dx=target.x-e.x;e.vx+=Math.sign(dx)*.25;e.vx=clamp(e.vx,-3,3)*.92;if(Math.abs(dx)<55&&tick%55===0){target.hp-=8;burst(target.x,target.y,"#991b1b",8)}physics(e)}}else updateBoss();if(!boss.live&&Math.abs(p1.x-npc.x)<100){if(kills>=3){say("Guide: press E for key");if(keys.e){keys.e=false;hasKey=true;say("Key obtained. Clear all enemies.")}}else say("Guide: defeat 3 first "+kills+"/3")}if(!boss.live&&Math.abs(p1.x-door.x)<130){if(!hasKey)say("Door locked. Find guide.");else if(enemies.some(e=>!e.dead))say("Clear remaining enemies.");else if(keys.e){keys.e=false;boss.live=true;boss.dead=false;boss.hp=coop?boss.max+90:boss.max;boss.x=3420;boss.y=250;p1.x=3060;p1.y=330;if(coop){p2.x=3130;p2.y=330}cam=2900;say("Boss arena entered"+(coop?" in co-op.":"."));burst(3400,360,"#4c1d95",50)}}if(p1.hp<=0&&(!coop||p2.hp<=0)){state="lose";btn.style.display="inline-block"}for(let i=particles.length-1;i>=0;i--){let q=particles[i];q.x+=q.vx;q.y+=q.vy;q.vy+=.14;q.life--;if(q.life<=0)particles.splice(i,1)}cam+=(clamp((boss.live?3300:p1.x)-450,0,2920)-cam)*.1;if(msgT>0)msgT--}
function bg(){if(boss.live){let gr=ctx.createRadialGradient(450,170,40,450,170,620);gr.addColorStop(0,"#264a7a");gr.addColorStop(.38,"#17132e");gr.addColorStop(1,"#090719");ctx.fillStyle=gr;ctx.fillRect(0,0,900,500);ctx.strokeStyle="rgba(125,230,255,.35)";ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(450,355,330,74,0,0,Math.PI*2);ctx.stroke();for(let i=0;i<8;i++){ctx.fillStyle="rgba(120,220,255,.10)";ctx.fillRect(80+i*110,0,18,420)}ctx.fillStyle="rgba(45,26,86,.55)";ctx.fillRect(0,390,900,90);return}let gr=ctx.createLinearGradient(0,0,0,500);gr.addColorStop(0,"#cdefff");gr.addColorStop(1,"#ffe9d6");ctx.fillStyle=gr;ctx.fillRect(0,0,900,500);ctx.fillStyle="#b7d9c4";for(let x=-200;x<3900;x+=520){ctx.beginPath();ctx.arc(sx(x),470,180,Math.PI,0);ctx.fill()}}
function platform(q){ctx.fillStyle=boss.live?"#1f1638":"#c59b72";ctx.fillRect(sx(q.x),q.y,q.w,q.h);ctx.fillStyle=boss.live?"#68e1fd":"#689f7d";ctx.fillRect(sx(q.x),q.y,q.w,7)}
function round(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);if(fill)ctx.fill();if(stroke)ctx.stroke()}
function drawHair(x,y,c){ctx.fillStyle=c.hair;ctx.strokeStyle="#0f172a";ctx.lineWidth=2;if(c.hairStyle==="pompadour"){ctx.beginPath();ctx.ellipse(x+19,y-31,22,14,-.25,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(x+25,y-43,14,10,-.5,0,Math.PI*2);ctx.fill();ctx.stroke()}else if(c.hairStyle==="spikes"){for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(x+5+i*8,y-18);ctx.lineTo(x+10+i*8,y-35-Math.sin(tick+i)*3);ctx.lineTo(x+17+i*8,y-18);ctx.fill();ctx.stroke()}}else if(c.hairStyle==="hood"){ctx.beginPath();ctx.arc(x+19,y-12,22,Math.PI,0);ctx.fill();ctx.stroke()}else if(c.hairStyle==="wild"){for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(x+2+i*8,y-18);ctx.lineTo(x+7+i*8,y-33-Math.sin(tick/10+i)*3);ctx.lineTo(x+13+i*8,y-18);ctx.fill();ctx.stroke()}}else if(c.hairStyle==="ponytail"){ctx.fillRect(x+6,y-24,26,9);ctx.beginPath();ctx.arc(x+38,y-12,9,0,Math.PI*2);ctx.fill()}else if(c.hairStyle==="messy"){for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(x+8+i*7,y-23-Math.sin(i+tick/15)*2,8,5,0,0,Math.PI*2);ctx.fill();}}else ctx.fillRect(x+6,y-24,26,9)}
function drawStaffSprite(pl,c){if(!c.staff)return;let x=sx(pl.x),y=pl.y,scale=2,sw=32*scale,sh=32*scale,off=pl.f>0?18:-42;ctx.save();if(pl.f<0){ctx.translate(x+off+sw,y-20);ctx.scale(-1,1);ctx.drawImage(staffImg,0,0,sw,sh)}else ctx.drawImage(staffImg,x+off,y-20,sw,sh);ctx.restore()}
function drawFighter(pl,c){let x=sx(pl.x),y=pl.y,bob=Math.sin(tick/10+pl.x)*2;let lean=pl.anim==="melee"?pl.f*5:pl.anim==="shoot"?pl.f*3:0;ctx.save();ctx.translate(lean,0);ctx.lineWidth=4;ctx.strokeStyle="#fff";ctx.fillStyle=c.color;round(x,y+bob,pl.w,pl.h,10,true,true);ctx.fillStyle="#f2d0b7";ctx.beginPath();ctx.arc(x+pl.w/2,y-10+bob,15,0,Math.PI*2);ctx.fill();ctx.stroke();drawHair(x,y+bob,c);ctx.fillStyle="#0f172a";ctx.fillRect(x+9,y+16+bob,6,6);ctx.fillRect(x+23,y+16+bob,6,6);if(pl.awaken){ctx.strokeStyle=c.fx;ctx.lineWidth=3;ctx.strokeRect(x-8,y-34+bob,pl.w+16,pl.h+42)}ctx.restore();drawStaffSprite(pl,c)}
function rect(o,c,outline=false){ctx.fillStyle=c;ctx.fillRect(sx(o.x),o.y,o.w,o.h);ctx.strokeStyle=outline?"#fff":"#111827";ctx.lineWidth=outline?4:1;ctx.strokeRect(sx(o.x),o.y,o.w,o.h)}
function drawEffects(){for(const h of effects){let a=Math.min(1,h.life/h.max);ctx.save();ctx.globalAlpha=a;ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.fillStyle=h.c;if(h.type==="slash"){ctx.strokeStyle="#fff";ctx.lineWidth=6;ctx.beginPath();ctx.arc(sx(h.x+h.w/2),h.y+h.h/2,50,Math.PI*.15,Math.PI*1.6);ctx.stroke();ctx.strokeStyle=h.c;ctx.lineWidth=8;ctx.beginPath();ctx.arc(sx(h.x+h.w/2),h.y+h.h/2,36,Math.PI*.2,Math.PI*1.45);ctx.stroke()}else if(h.type==="staff"){ctx.strokeStyle="#fff";ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(sx(h.x),h.y+h.h/2);ctx.lineTo(sx(h.x+h.w),h.y+h.h/2-10);ctx.stroke();ctx.strokeStyle=h.c;ctx.lineWidth=4;ctx.stroke()}else if(h.type==="pompadour"){ctx.fillRect(sx(h.x),h.y+h.h/2-6,h.w,12);ctx.strokeRect(sx(h.x),h.y+h.h/2-10,h.w,20);ctx.beginPath();ctx.arc(sx(h.x+h.w),h.y+h.h/2,20,0,Math.PI*2);ctx.stroke()}else if(h.type==="graniteCannon"||h.type==="beam"){ctx.globalAlpha=.35*a;ctx.fillRect(sx(h.x),h.y,h.w,h.h);ctx.globalAlpha=a;ctx.fillStyle="#fff";ctx.fillRect(sx(h.x),h.y+h.h/2-4,h.w,8);ctx.strokeRect(sx(h.x),h.y,h.w,h.h)}else if(h.type==="output"||h.type==="awakening"||h.type==="ring"||h.type==="magicCircle"){let r=Math.max(h.w,h.h)/2*(1+(1-a)*.35);ctx.globalAlpha=.23*a;ctx.beginPath();ctx.arc(sx(h.x+h.w/2),h.y+h.h/2,r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=a;ctx.beginPath();ctx.arc(sx(h.x+h.w/2),h.y+h.h/2,r,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(sx(h.x+h.w/2),h.y+h.h/2,r*.55,0,Math.PI*2);ctx.stroke()}else{ctx.globalAlpha=.24*a;ctx.fillRect(sx(h.x),h.y,h.w,h.h);ctx.globalAlpha=a;ctx.strokeRect(sx(h.x),h.y,h.w,h.h)}ctx.restore()}for(const q of particles){ctx.globalAlpha=Math.max(0,q.life/35);ctx.fillStyle=q.c;ctx.beginPath();ctx.arc(sx(q.x),q.y,q.s,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function selectScreen(){bg();ctx.fillStyle="rgba(15,23,42,.84)";ctx.fillRect(0,0,900,500);text("V6.2 Animation + Staff Fix",255,48,30,"white");text("Press C: Co-op "+(coop?"ON":"OFF"),340,78,18,coop?"#bbf7d0":"#fecaca");for(let i=0;i<ids.length;i++){let id=ids[i],c=chars[id],x=35+(i%4)*215,y=100+Math.floor(i/4)*180;ctx.fillStyle="rgba(255,255,255,.86)";round(x,y,195,145,14,true,false);ctx.strokeStyle=c.fx;ctx.lineWidth=4;round(x,y,195,145,14,false,true);drawMini(x+24,y+55,c);text((i+1)+". "+c.name,x+12,y+24,14);text("J: "+c.j,x+12,y+88,11);text("U: "+c.u,x+12,y+106,11);text("K: "+(c.granite?"Granite Shot/Cannon":c.canBeam?"Shot/Beam":"Shot"),x+12,y+124,11);text("T: "+c.awk,x+12,y+140,10)}text("real staff sprite + animation cleanup",315,485,16,"white")}
function drawMini(x,y,c){ctx.save();ctx.fillStyle=c.color;ctx.strokeStyle="#fff";ctx.lineWidth=3;round(x,y,28,45,8,true,true);ctx.fillStyle="#f2d0b7";ctx.beginPath();ctx.arc(x+14,y-8,12,0,Math.PI*2);ctx.fill();ctx.stroke();drawHair(x-5,y,c);if(c.staff)ctx.drawImage(staffImg,x+28,y-24,48,48);ctx.restore()}
function draw(){let ox=shake?(Math.random()-.5)*shake:0,oy=shake?(Math.random()-.5)*shake:0;ctx.save();ctx.translate(ox,oy);bg();if(state==="select"){selectScreen();ctx.restore();return}for(const q of plats())platform(q);if(!boss.live){rect(npc,hasKey?"#9ca3af":"#c0841a");rect(door,hasKey&&!enemies.some(e=>!e.dead)?"#168987":"#8a5a44")}for(const h of hazards){ctx.globalAlpha=.55;ctx.fillStyle=h.c;ctx.fillRect(sx(h.x),h.y,h.w,h.h);ctx.globalAlpha=1;ctx.strokeStyle="#fff";ctx.strokeRect(sx(h.x)-2,h.y-2,h.w+4,h.h+4)}drawEffects();for(const s of shots){for(let i=0;i<s.trail.length;i++){ctx.globalAlpha=i/s.trail.length*.35;ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(sx(s.trail[i].x),s.trail[i].y,Math.max(2,s.w/3),0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;rect(s,s.c,s.owner==="boss");if(s.big){ctx.strokeStyle="#fff";ctx.strokeRect(sx(s.x)-2,s.y-2,s.w+4,s.h+4)}}for(const e of enemies)if(!e.dead)rect(e,e.c);if(boss.live&&!boss.dead){rect(boss,"#7e22ce",true);text(boss.move||"stalking",sx(boss.x)-8,boss.y-12,13,"white")}drawFighter(p1,chars[pick]);if(coop)drawFighter(p2,chars.basic);text("P1 HP "+Math.floor(p1.hp),24,34);text("P1 EN "+Math.floor(p1.en),24,58);text("P1 AWK "+Math.floor(p1.awk),24,82);text(chars[pick].name,24,106);if(coop){text("P2 HP "+Math.floor(p2.hp),150,34);text("P2 EN "+Math.floor(p2.en),150,58);text("P2 AWK "+Math.floor(p2.awk),150,82)}boss.live?text("Boss "+Math.floor(boss.hp),560,34,16,"white"):text("Defeated "+kills+" Left "+enemies.filter(e=>!e.dead).length,560,34);if(msgT>0){ctx.fillStyle="rgba(255,255,255,.88)";ctx.fillRect(230,90,450,45);text(msg,250,118)}if(state==="win"||state==="lose"){ctx.fillStyle="rgba(0,0,0,.72)";ctx.fillRect(0,0,900,500);text(state==="win"?"YOU WIN":"YOU LOSE",340,230,42,"white")}ctx.restore()}
function loop(){if(state==="play")update();draw();requestAnimationFrame(loop)}btn.onclick=()=>location.reload();spawn();loop();
</script></body></html>
