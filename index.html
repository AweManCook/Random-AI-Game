<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Platform Fighter V5.4</title><style>body{margin:0;background:#171b22;color:white;font-family:Arial;text-align:center}canvas{display:block;margin:auto;border:4px solid white;background:#87ceeb}button{display:none;margin:10px;padding:10px}</style></head><body><h1>Platform Fighter V5.4</h1><p>1-6 select. A/D move, W jump, J melee, U special, tap K shot, hold K beam, E interact.</p><canvas id='c' width='900' height='500'></canvas><button id='r'>Restart</button><script>const c=document.getElementById('c'),g=c.getContext('2d'),r=document.getElementById('r'),K={};let state='select',pick='basic',cam=0,t=0,score=0,key=false,msg='',msgT=0,shots=[],lastK=false;onkeydown=e=>{let k=e.key.toLowerCase();K[k]=1;if(state=='select'&&'123456'.includes(k)){pick=['basic','burst','mage','rubber','ki','aura'][Number(k)-1];state='play';msg=builds[pick].n+' selected';msgT=90}};onkeyup=e=>K[e.key.toLowerCase()]=0;const builds={basic:{n:'Basic Fighter',c:'#2f80ed',a:'#00f5d4',m:22,u:16,s:13,b:4,w:38,r:650,j:'Forward Slash',uName:'Surround Burst'},burst:{n:'Burst Striker',c:'#ff4d6d',a:'#ffbe0b',m:30,u:24,s:20,b:6,w:66,r:470,j:'Heavy Cleave',uName:'Explosive Slam'},mage:{n:'Thousand-Year Mage',c:'#8338ec',a:'#b8f2ff',m:18,u:22,s:5,b:3,w:22,r:860,j:'Ancient Stab',uName:'Auto Magic Rig',auto:true},rubber:{n:'Rubber Pirate',c:'#e63946',a:'#ffd166',m:20,u:18,s:12,b:4,w:44,r:720,j:'Stretch Punch',uName:'Balloon Burst',stretch:true},ki:{n:'Ki Warrior',c:'#f77f00',a:'#fff200',m:24,u:20,s:16,b:5,w:50,r:760,j:'Meteor Strike',uName:'Ki Flare'},aura:{n:'Aura Hunter',c:'#2a9d8f',a:'#9b5de5',m:21,u:26,s:10,b:4,w:36,r:700,j:'Quick Claw',uName:'Aura Trap',auto:true}};const plats=[{x:0,y:450,w:3800,h:50},{x:220,y:330,w:250,h:22},{x:620,y:270,w:240,h:22},{x:1050,y:350,w:270,h:22},{x:1480,y:300,w:260,h:22},{x:1880,y:240,w:250,h:22},{x:2260,y:350,w:280,h:22},{x:2700,y:295,w:260,h:22},{x:3180,y:340,w:270,h:22}],npc={x:1880,y:178,w:42,h:62},door={x:3400,y:330,w:70,h:120};function P(){return{x:80,y:350,w:40,h:60,vx:0,vy:0,f:1,on:0,hp:130,en:100,atk:0,sp:0,cd:0,hold:0,beam:false,dead:false}}let p=P(),final={x:3420,y:350,w:70,h:92,vx:0,vy:0,hp:360,max:360,on:false,dead:false},en=[];function enemy(x,y,type){let fast=type=='fast',tank=type=='tank';return{x,y,w:tank?55:42,h:tank?72:62,vx:0,vy:0,hp:tank?82:fast?32:48,down:false,c:tank?'#8d2f2f':fast?'#ff9f1c':'#e74c3c'}}function spawn(){en=[enemy(520,350),enemy(860,200,'fast'),enemy(1240,350),enemy(1640,230,'tank'),enemy(2050,180,'fast'),enemy(2420,350),enemy(2860,230,'tank'),enemy(3140,270,'fast')]}function sx(x){return x-cam}function R(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function clamp(n,a,b){return Math.max(a,Math.min(b,n))}function say(s){msg=s;msgT=100}function phys(o){o.vy+=.72;o.x+=o.vx;o.y+=o.vy;o.on=0;o.x=clamp(o.x,0,3760);for(let q of plats)if(R(o,q)&&o.vy>=0){o.y=q.y-o.h;o.vy=0;o.on=1}if(o.y>700){if(o===p){p.hp-=30;p.x=80;p.y=200;p.vx=p.vy=0}else{o.x-=100;o.y=200;o.vx=o.vy=0}}}function target(){let live=en.filter(e=>!e.down);if(final.on&&!final.dead)live.push(final);if(!live.length)return null;live.sort((a,b)=>Math.abs((a.x+a.w/2)-(p.x+p.w/2))-Math.abs((b.x+b.w/2)-(p.x+p.w/2)));return live[0]}function damage(o,v){o.hp-=v;o.vx=(o.x<p.x?-1:1)*6;if(o.hp<=0&&!o.down){o.down=true;score++}if(o===final&&o.hp<=0&&!final.dead){final.dead=true;state='win';r.style.display='inline-block'}}function meleeBox(){let b=builds[pick];if(pick=='mage')return{x:p.f>0?p.x+100:p.x-190,y:p.y+16,w:130,h:28};if(pick=='rubber')return{x:p.f>0?p.x+p.w:p.x-125,y:p.y+12,w:125,h:42};return{x:p.f>0?p.x+p.w:p.x-70,y:p.y+10,w:70,h:45}}function specialBox(){let b=builds[pick];if(b.auto){let q=target();if(q)return{x:q.x-15,y:q.y-15,w:q.w+30,h:q.h+30};}if(pick=='burst')return{x:p.x-75,y:p.y-45,w:p.w+150,h:p.h+90};return{x:p.x-50,y:p.y-35,w:p.w+100,h:p.h+70}}function beamBox(){let b=builds[pick];return{x:p.f>0?p.x+p.w:p.x-b.r,y:p.y+28-b.w/2,w:b.r,h:b.w}}function shoot(){let b=builds[pick];shots.push({x:p.f>0?p.x+p.w:p.x-16,y:p.y+30,w:pick=='burst'?26:16,h:10,vx:p.f*(pick=='burst'?8:12),v:b.s,c:b.a})}function update(){t++;let b=builds[pick];if(K.a){p.vx-=1.15;p.f=-1}if(K.d){p.vx+=1.15;p.f=1}p.vx=clamp(p.vx,-8,8)*.84;if(K.w&&p.on){p.vy=-14;p.on=0}if(K.j&&p.atk<=0)p.atk=12;if(K.u&&p.sp<=0)p.sp=18;if(K.k){p.hold++;if(p.hold>24&&p.en>0){p.beam=true;p.en-=.65}}else{if(lastK&&p.hold>0&&p.hold<=24&&p.cd<=0){shoot();p.cd=24}p.hold=0;p.beam=false}lastK=K.k;if(p.atk>0)p.atk--;if(p.sp>0)p.sp--;if(p.cd>0)p.cd--;if(!p.beam&&p.en<100)p.en+=.4;phys(p);if(p.atk==11){let hb=meleeBox();for(let e of en)if(!e.down&&R(hb,e))damage(e,b.m);if(final.on&&!final.dead&&R(hb,final))damage(final,b.m)}if(p.sp==17){let hb=specialBox();for(let e of en)if(!e.down&&R(hb,e))damage(e,b.u);if(final.on&&!final.dead&&R(hb,final))damage(final,b.u)}if(p.beam&&t%6==0){let hb=beamBox();for(let e of en)if(!e.down&&R(hb,e))damage(e,b.b);if(final.on&&!final.dead&&R(hb,final))damage(final,b.b)}for(let i=shots.length-1;i>=0;i--){let s=shots[i];s.x+=s.vx;let gone=false;for(let e of en)if(!e.down&&R(s,e)){damage(e,s.v);gone=true;break}if(final.on&&!final.dead&&R(s,final)){damage(final,s.v);gone=true}if(gone||s.x<cam-100||s.x>cam+1000)shots.splice(i,1)}if(!final.on){for(let e of en){if(e.down)continue;let dx=p.x-e.x;e.vx+=Math.sign(dx)*.25;e.vx=clamp(e.vx,-3,3)*.92;if(Math.abs(dx)<55&&t%55==0)p.hp-=8;phys(e)}}else{let dx=p.x-final.x;final.vx+=Math.sign(dx)*.25;final.vx=clamp(final.vx,-4,4)*.92;if(Math.abs(dx)<75&&t%50==0)p.hp-=14;phys(final)}if(!final.on&&Math.abs(p.x-npc.x)<100){if(score>=3){say('Guide: press E for key');if(K.e){K.e=false;key=true;say('Key obtained. Clear all enemies.')}}else say('Guide: defeat 3 first '+score+'/3')}if(!final.on&&Math.abs(p.x-door.x)<120){if(!key)say('Door locked. Find guide.');else if(en.some(e=>!e.down))say('Clear remaining enemies.');else if(K.e){K.e=false;final.on=true;final.hp=final.max;p.x=3060;p.y=240;cam=2900}}if(p.hp<=0){state='lose';r.style.display='inline-block'}cam+=(clamp((final.on?3300:p.x)-450,0,2900)-cam)*.1;if(msgT>0)msgT--}function bg(){g.fillStyle=final.on?'#bdf6ff':'#7fc7ff';g.fillRect(0,0,900,500);g.fillStyle='#6fcf97';for(let x=-200;x<3800;x+=520){g.beginPath();g.arc(sx(x),470,180,Math.PI,0);g.fill()}}function rect(o,c){g.fillStyle=c;g.fillRect(sx(o.x),o.y,o.w,o.h);g.strokeStyle='black';g.strokeRect(sx(o.x),o.y,o.w,o.h)}function draw(){bg();if(state=='select'){g.fillStyle='rgba(0,0,0,.65)';g.fillRect(0,0,900,500);g.fillStyle='white';g.font='30px Arial';g.fillText('Choose Character',330,70);let names=['1 Basic','2 Burst','3 Mage','4 Rubber Pirate','5 Ki Warrior','6 Aura Hunter'];for(let i=0;i<names.length;i++)g.fillText(names[i],300,130+i*45);return}for(let q of plats){g.fillStyle='#5b3b22';g.fillRect(sx(q.x),q.y,q.w,q.h);g.fillStyle='#3fa34d';g.fillRect(sx(q.x),q.y,q.w,6)}if(!final.on){rect(npc,key?'#ccc':'#ffd166');rect(door,key&&!en.some(e=>!e.down)?'#00f5d4':'#4b2e18')}let b=builds[pick];if(p.atk>0){let hb=meleeBox();g.fillStyle='rgba(255,255,0,.4)';g.fillRect(sx(hb.x),hb.y,hb.w,hb.h)}if(p.sp>0){let hb=specialBox();g.fillStyle='rgba(0,245,212,.35)';g.fillRect(sx(hb.x),hb.y,hb.w,hb.h)}if(p.beam){let hb=beamBox();g.globalAlpha=.35;g.fillStyle=b.a;g.fillRect(sx(hb.x),hb.y,hb.w,hb.h);g.globalAlpha=1}for(let s of shots)rect(s,s.c);for(let e of en)if(!e.down)rect(e,e.c);if(final.on&&!final.dead)rect(final,'#7b2cff');rect(p,b.c);if(pick=='mage'){g.strokeStyle='#ffcc00';g.lineWidth=4;g.beginPath();g.moveTo(sx(p.x)+40,p.y+5);g.lineTo(sx(p.x)+55,p.y+50);g.stroke()}g.fillStyle='white';g.font='14px Arial';g.fillText('HP '+Math.floor(p.hp),25,35);g.fillText('EN '+Math.floor(p.en),25,60);g.fillText(b.n,25,85);if(final.on)g.fillText('Boss '+Math.floor(final.hp),560,35);else g.fillText('Defeated '+score+' Left '+en.filter(e=>!e.down).length,560,35);if(msgT>0){g.fillStyle='rgba(0,0,0,.65)';g.fillRect(250,90,400,45);g.fillStyle='white';g.fillText(msg,270,118)}if(state=='win'||state=='lose'){g.fillStyle='rgba(0,0,0,.7)';g.fillRect(0,0,900,500);g.fillStyle='white';g.font='42px Arial';g.fillText(state=='win'?'YOU WIN':'YOU LOSE',340,230)}}function loop(){if(state=='play')update();draw();requestAnimationFrame(loop)}r.onclick=()=>location.reload();spawn();function spawn(){en=[enemy(520,350),enemy(860,200,'fast'),enemy(1240,350),enemy(1640,230,'tank'),enemy(2050,180,'fast'),enemy(2420,350),enemy(2860,230,'tank'),enemy(3140,270,'fast')]}function enemy(x,y,type){let fast=type=='fast',tank=type=='tank';return{x,y,w:tank?55:42,h:tank?72:62,vx:0,vy:0,hp:tank?82:fast?32:48,down:false,c:tank?'#8d2f2f':fast?'#ff9f1c':'#e74c3c'}}loop();</script></body></html>
