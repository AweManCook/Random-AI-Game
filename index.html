<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Platform Fighter Prototype V3</title>
  <style>
    body { margin:0; background:#171b22; color:white; font-family:Arial,sans-serif; text-align:center; }
    h1 { margin:12px 0 4px; }
    p { margin:4px 0 10px; color:#ddd; }
    canvas { display:block; margin:0 auto; background:#7fc7ff; border:4px solid white; }
    button { display:none; margin-top:10px; padding:10px 16px; font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>Scrolling Platform Fighter V3</h1>
  <p>A/D move | W jump | J melee | K ranged / beam clash</p>
  <canvas id="gameCanvas" width="900" height="500"></canvas>
  <button id="restartButton">Restart Game</button>

  <script>
    /*
      V3 upgrade notes for beginners:
      - The map is wider than the screen, so we use a camera.
      - Enemies are stored in an array, so we can have many enemies.
      - The game has multiple states: loading, level, transition, bossIntro, boss, clash, win, lose.
      - The boss has a special attack that starts a cutscene and then an inside battle / beam clash minigame.
    */

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const restartButton = document.getElementById("restartButton");
    const keys = {};
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    const world = { width: 3800, height: 500 };
    const gravity = 0.72;
    const friction = 0.84;
    let cameraX = 0;
    let gameState = "loading";
    let loadingTimer = 90;
    let levelTimer = 0;
    let message = "";
    let respawnTimer = 0;
    let invincibleTimer = 0;
    let cutsceneTimer = 0;
    let clashTimer = 0;
    let clashPower = 50;
    let bossStarted = false;
    let lastKDown = false;

    const platforms = [
      { x:0, y:450, width:3800, height:50 },
      { x:180, y:330, width:260, height:24 },
      { x:600, y:270, width:250, height:24 },
      { x:1020, y:350, width:300, height:24 },
      { x:1480, y:300, width:260, height:24 },
      { x:1880, y:240, width:250, height:24 },
      { x:2260, y:350, width:300, height:24 },
      { x:2700, y:295, width:260, height:24 },
      { x:3180, y:340, width:280, height:24 }
    ];

    const player = {
      x:80, y:350, width:40, height:60, color:"#2f80ed",
      vx:0, vy:0, speed:1.18, maxSpeed:8.5, jumpPower:-14.5,
      onGround:false, facing:1,
      health:110, maxHealth:110, lives:3,
      attacking:false, attackTimer:0, attackCooldown:0, hasHit:false,
      rangedCooldown:0
    };

    const boss = {
      x:3420, y:350, width:70, height:92, color:"#7b2cff",
      vx:0, vy:0, speed:0.72, maxSpeed:5.2, jumpPower:-13,
      onGround:false, facing:-1,
      health:450, maxHealth:450,
      attacking:false, attackTimer:0, attackCooldown:0, hasHit:false,
      rangedCooldown:0, specialCooldown:260, active:false, defeated:false
    };

    let enemies = [];
    let projectiles = [];

    function rects(a,b){ return a.x < b.x+b.width && a.x+a.width > b.x && a.y < b.y+b.height && a.y+a.height > b.y; }
    function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }
    function screenX(x){ return x - cameraX; }

    function makeEnemy(x,y,type="grunt"){
      const fast = type === "fast";
      const tank = type === "tank";
      return {
        x, y, width:tank?55:42, height:tank?72:62,
        color: tank?"#a83232":fast?"#ff9f1c":"#e74c3c",
        vx:0, vy:0, speed:fast?0.72:0.48, maxSpeed:fast?5.0:3.8, jumpPower:-12,
        onGround:false, facing:-1,
        health:tank?150:fast?75:95, maxHealth:tank?150:fast?75:95,
        damage:tank?18:fast?10:13,
        attacking:false, attackTimer:0, attackCooldown:Math.random()*70, hasHit:false,
        rangedCooldown:80 + Math.random()*120,
        defeated:false, type
      };
    }

    function spawnEnemies(){
      enemies = [
        makeEnemy(520,350), makeEnemy(860,200,"fast"), makeEnemy(1240,350),
        makeEnemy(1640,230,"tank"), makeEnemy(2050,180,"fast"), makeEnemy(2420,350),
        makeEnemy(2860,230,"tank"), makeEnemy(3140,270,"fast")
      ];
    }

    function applyPhysics(obj){
      obj.vy += gravity;
      obj.x += obj.vx;
      obj.x = clamp(obj.x, 0, world.width - obj.width);
      obj.y += obj.vy;
      obj.onGround = false;
      for(const p of platforms){
        if(rects(obj,p) && obj.vy >= 0){ obj.y = p.y - obj.height; obj.vy = 0; obj.onGround = true; }
      }
      if(obj.y > 700){
        if(obj === player) damagePlayer(999);
        else { obj.x -= 160; obj.y = 200; obj.vx = 0; obj.vy = 0; }
      }
    }

    function playerMelee(){ return { x: player.facing===1 ? player.x+player.width : player.x-62, y:player.y+12, width:62, height:42 }; }
    function enemyMelee(e){ return { x:e.facing===1 ? e.x+e.width : e.x-55, y:e.y+15, width:55, height:42 }; }
    function bossMelee(){ return { x:boss.facing===1 ? boss.x+boss.width : boss.x-80, y:boss.y+20, width:80, height:55 }; }

    function shoot(owner,x,y,dir,damage,color,speed=11,size=18){
      projectiles.push({ owner, x, y, width:size, height:size*0.55, vx:speed*dir, damage, color });
    }

    function damagePlayer(amount){
      if(gameState !== "level" && gameState !== "boss") return;
      if(invincibleTimer > 0 || respawnTimer > 0) return;
      player.health -= amount;
      player.vy = -5;
      if(player.health <= 0){
        player.lives--;
        if(player.lives <= 0){ lose("You ran out of lives!"); return; }
        respawnTimer = 80;
      }
    }

    function damageEnemy(e,amount,dir){
      e.health -= amount;
      e.vx = 8 * dir;
      e.vy = -4;
      if(e.health <= 0) e.defeated = true;
    }

    function updatePlayer(){
      if(respawnTimer > 0) return;
      if(keys.a){ player.vx -= player.speed; player.facing = -1; }
      if(keys.d){ player.vx += player.speed; player.facing = 1; }
      player.vx = clamp(player.vx, -player.maxSpeed, player.maxSpeed);
      if(keys.w && player.onGround){ player.vy = player.jumpPower; player.onGround = false; }
      player.vx *= friction;

      if(keys.j && player.attackCooldown <= 0){
        player.attacking = true; player.attackTimer = 12; player.attackCooldown = 20; player.hasHit = false;
      }
      if(player.attacking && --player.attackTimer <= 0) player.attacking = false;
      if(player.attackCooldown > 0) player.attackCooldown--;

      if(keys.k && player.rangedCooldown <= 0){
        shoot("player", player.facing===1 ? player.x+player.width : player.x-18, player.y+28, player.facing, 15, "#00f5d4");
        player.rangedCooldown = 26;
      }
      if(player.rangedCooldown > 0) player.rangedCooldown--;

      // Constant player regen, but slow enough that enemies can still beat you.
      if(levelTimer % 55 === 0 && player.health < player.maxHealth) player.health++;
      if(invincibleTimer > 0) invincibleTimer--;
      applyPhysics(player);
    }

    function updateRespawn(){
      if(respawnTimer <= 0) return;
      respawnTimer--;
      player.vx = 0; player.vy = 0;
      if(respawnTimer === 0){
        player.health = player.maxHealth;
        player.x = bossStarted ? 3060 : Math.max(70, player.x - 220);
        player.y = 120;
        invincibleTimer = 130;
      }
    }

    function updateEnemyAI(e){
      if(e.defeated) return;
      const dx = (player.x+player.width/2) - (e.x+e.width/2);
      const dy = (player.y+player.height/2) - (e.y+e.height/2);
      const dist = Math.abs(dx);
      e.facing = dx >= 0 ? 1 : -1;

      // Only wake up enemies near the camera/player.
      if(Math.abs(e.x - player.x) > 720) return;

      if(dist > 58) e.vx += e.speed * e.facing;
      else e.vx *= 0.7;
      e.vx = clamp(e.vx, -e.maxSpeed, e.maxSpeed);
      if(dy < -50 && e.onGround) e.vy = e.jumpPower;

      if(dist < 70 && Math.abs(dy) < 70 && e.attackCooldown <= 0){
        e.attacking = true; e.attackTimer = 14; e.attackCooldown = e.type==="fast" ? 38 : 55; e.hasHit = false;
      }
      if(e.attacking && --e.attackTimer <= 0) e.attacking = false;
      if(e.attackCooldown > 0) e.attackCooldown--;

      if(dist > 190 && dist < 560 && Math.abs(dy) < 90 && e.rangedCooldown <= 0){
        shoot("enemy", e.facing===1 ? e.x+e.width : e.x-16, e.y+30, e.facing, e.type==="tank"?13:9, "#ff7b00", 9, 16);
        e.rangedCooldown = e.type==="fast" ? 95 : 125;
      }
      if(e.rangedCooldown > 0) e.rangedCooldown--;

      // Constant enemy regen makes the game harder if you run away too long.
      if(levelTimer % 90 === 0 && e.health < e.maxHealth) e.health++;
      e.vx *= 0.94;
      applyPhysics(e);
    }

    function updateBoss(){
      if(!boss.active || boss.defeated) return;
      const dx = (player.x+20) - (boss.x+35);
      const dy = player.y - boss.y;
      const dist = Math.abs(dx);
      boss.facing = dx >= 0 ? 1 : -1;

      if(dist > 90) boss.vx += boss.speed * boss.facing;
      else boss.vx *= 0.72;
      boss.vx = clamp(boss.vx, -boss.maxSpeed, boss.maxSpeed);
      if(dy < -55 && boss.onGround) boss.vy = boss.jumpPower;

      if(dist < 105 && Math.abs(dy) < 90 && boss.attackCooldown <= 0){
        boss.attacking = true; boss.attackTimer = 18; boss.attackCooldown = 48; boss.hasHit = false;
      }
      if(boss.attacking && --boss.attackTimer <= 0) boss.attacking = false;
      if(boss.attackCooldown > 0) boss.attackCooldown--;

      if(dist > 200 && dist < 700 && boss.rangedCooldown <= 0){
        shoot("boss", boss.facing===1 ? boss.x+boss.width : boss.x-24, boss.y+42, boss.facing, 18, "#c77dff", 12, 28);
        boss.rangedCooldown = 82;
      }
      if(boss.rangedCooldown > 0) boss.rangedCooldown--;

      // Boss special: cinematic domain/inside-battle beam clash.
      if(boss.specialCooldown-- <= 0 && dist < 760){
        gameState = "bossCutscene";
        cutsceneTimer = 130;
        boss.specialCooldown = 330;
      }

      if(levelTimer % 70 === 0 && boss.health < boss.maxHealth) boss.health += 2;
      boss.vx *= 0.94;
      applyPhysics(boss);
      if(boss.health <= 0){ boss.defeated = true; win(); }
    }

    function checkMeleeHits(){
      if(player.attacking){
        const h = playerMelee();
        for(const e of enemies){
          if(!e.defeated && rects(h,e) && !player.hasHit){ damageEnemy(e,24,player.facing); player.hasHit = true; }
        }
        if(boss.active && !boss.defeated && rects(h,boss) && !player.hasHit){ damageEnemy(boss,18,player.facing); player.hasHit = true; }
      }
      for(const e of enemies){
        if(!e.defeated && e.attacking && rects(enemyMelee(e),player) && !e.hasHit){ damagePlayer(e.damage); player.vx = 8*e.facing; e.hasHit = true; }
      }
      if(boss.active && boss.attacking && rects(bossMelee(),player) && !boss.hasHit){ damagePlayer(24); player.vx = 12*boss.facing; player.vy = -6; boss.hasHit = true; }
    }

    function updateProjectiles(){
      for(let i=projectiles.length-1;i>=0;i--){
        const p = projectiles[i];
        p.x += p.vx;
        if(p.x < -100 || p.x > world.width+100){ projectiles.splice(i,1); continue; }
        if(p.owner === "player"){
          let hit = false;
          for(const e of enemies){ if(!e.defeated && rects(p,e)){ damageEnemy(e,p.damage,Math.sign(p.vx)); hit = true; break; } }
          if(!hit && boss.active && !boss.defeated && rects(p,boss)){ damageEnemy(boss,p.damage,Math.sign(p.vx)); hit = true; }
          if(hit) projectiles.splice(i,1);
        } else if(rects(p,player)){
          damagePlayer(p.damage);
          projectiles.splice(i,1);
        }
      }
    }

    function maybeStartBossTransition(){
      // Boss transition starts when you reach the far side or survive long enough.
      if(!bossStarted && (player.x > 3220 || levelTimer > 3600)){
        bossStarted = true;
        gameState = "transition";
        cutsceneTimer = 120;
        projectiles = [];
      }
    }

    function updateCamera(){
      const target = gameState === "boss" || gameState === "bossCutscene" || gameState === "clash" ? 2950 : player.x - canvas.width/2;
      cameraX += (clamp(target,0,world.width-canvas.width) - cameraX) * 0.09;
    }

    function updateGame(){
      levelTimer++;
      updateRespawn();
      updatePlayer();
      enemies.forEach(updateEnemyAI);
      updateBoss();
      checkMeleeHits();
      updateProjectiles();
      maybeStartBossTransition();
      updateCamera();
    }

    function drawBackground(){
      ctx.fillStyle = gameState === "clash" ? "#140020" : "#7fc7ff";
      ctx.fillRect(0,0,canvas.width,canvas.height);
      if(gameState !== "clash"){
        ctx.fillStyle = "#ffd166"; ctx.beginPath(); ctx.arc(790,80,35,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = "#6fcf97";
        for(let x=-200; x<world.width; x+=520){ ctx.beginPath(); ctx.arc(screenX(x),470,180,Math.PI,0); ctx.fill(); }
      }
    }

    function drawPlatforms(){
      for(const p of platforms){
        if(screenX(p.x+p.width) < -50 || screenX(p.x) > canvas.width+50) continue;
        ctx.fillStyle = "#5b3b22"; ctx.fillRect(screenX(p.x),p.y,p.width,p.height);
        ctx.fillStyle = "#3fa34d"; ctx.fillRect(screenX(p.x),p.y,p.width,6);
        ctx.strokeStyle = "black"; ctx.strokeRect(screenX(p.x),p.y,p.width,p.height);
      }
    }

    function drawRect(obj){
      if(obj === player && invincibleTimer > 0 && Math.floor(invincibleTimer/6)%2===0) return;
      ctx.fillStyle = obj.color;
      ctx.fillRect(screenX(obj.x),obj.y,obj.width,obj.height);
      ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.strokeRect(screenX(obj.x),obj.y,obj.width,obj.height);
      ctx.fillStyle = "white"; ctx.font = "19px Arial"; ctx.fillText(obj.facing===1?">":"<", screenX(obj.x)+obj.width/2-5, obj.y+36);
    }

    function drawBar(x,y,w,h,hp,max,label,color="#2ecc71"){
      ctx.fillStyle = "#333"; ctx.fillRect(x,y,w,h);
      ctx.fillStyle = color; ctx.fillRect(x,y,w*clamp(hp/max,0,1),h);
      ctx.strokeStyle = "white"; ctx.strokeRect(x,y,w,h);
      ctx.fillStyle = "white"; ctx.font = "15px Arial"; ctx.fillText(label+": "+Math.max(0,Math.floor(hp)),x,y-5);
    }

    function drawHitboxes(){
      if(player.attacking){ const h = playerMelee(); ctx.fillStyle="rgba(255,255,0,.5)"; ctx.fillRect(screenX(h.x),h.y,h.width,h.height); }
      for(const e of enemies){ if(!e.defeated && e.attacking){ const h=enemyMelee(e); ctx.fillStyle="rgba(255,80,80,.38)"; ctx.fillRect(screenX(h.x),h.y,h.width,h.height); } }
      if(boss.active && boss.attacking){ const h=bossMelee(); ctx.fillStyle="rgba(199,125,255,.45)"; ctx.fillRect(screenX(h.x),h.y,h.width,h.height); }
    }

    function drawProjectiles(){
      for(const p of projectiles){ ctx.fillStyle=p.color; ctx.fillRect(screenX(p.x),p.y,p.width,p.height); ctx.strokeStyle="black"; ctx.strokeRect(screenX(p.x),p.y,p.width,p.height); }
    }

    function drawHud(){
      drawBar(25,35,235,20,player.health,player.maxHealth,"Player");
      ctx.fillStyle="white"; ctx.font="17px Arial"; ctx.fillText("Lives: "+player.lives,25,86);
      ctx.fillText("Map: "+Math.floor(player.x)+" / "+world.width,25,110);
      if(boss.active) drawBar(560,35,300,22,boss.health,boss.maxHealth,"Boss","#c77dff");
      else ctx.fillText("Goal: survive and reach the far right",560,50);
      if(respawnTimer>0){ ctx.font="32px Arial"; ctx.fillText("Respawning...",340,210); }
    }

    function drawLevel(){
      drawBackground(); drawPlatforms(); drawHitboxes(); drawProjectiles();
      if(respawnTimer <= 0) drawRect(player);
      for(const e of enemies){ if(!e.defeated) drawRect(e); }
      if(boss.active && !boss.defeated) drawRect(boss);
      drawHud();
      ctx.fillStyle="black"; ctx.font="16px Arial"; ctx.fillText("Enemies regen slowly. Keep pressure on them!  J melee | K ranged",230,485);
    }

    function drawLoading(){
      drawBackground();
      ctx.fillStyle="rgba(0,0,0,.55)"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="white"; ctx.font="42px Arial"; ctx.fillText("Loading Bigger Map...",265,210);
      const fill = (90-loadingTimer)/90*360;
      ctx.fillStyle="#333"; ctx.fillRect(270,245,360,28);
      ctx.fillStyle="#00f5d4"; ctx.fillRect(270,245,fill,28);
      ctx.strokeStyle="white"; ctx.strokeRect(270,245,360,28);
    }

    function drawTransition(){
      drawLevel();
      ctx.fillStyle="rgba(0,0,0,.65)"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="white"; ctx.font="34px Arial"; ctx.fillText("The arena bends...",305,190);
      ctx.font="20px Arial"; ctx.fillText("A boss pulls you into a final stage.",300,230);
    }

    function drawBossCutscene(){
      drawLevel();
      ctx.fillStyle="rgba(20,0,30,.72)"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="#c77dff"; ctx.font="36px Arial"; ctx.fillText("BOSS SPECIAL: INNER TRIAL",230,180);
      ctx.fillStyle="white"; ctx.font="20px Arial"; ctx.fillText("The fight pauses. A beam clash is about to start.",250,225);
      ctx.fillText("Mash K during the clash to push back!",285,255);
    }

    function drawClash(){
      ctx.fillStyle="#140020"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="white"; ctx.font="32px Arial"; ctx.fillText("INSIDE BATTLE: BEAM CLASH",240,90);
      ctx.font="19px Arial"; ctx.fillText("Mash K to push the beam to the boss side before time runs out!",205,125);
      ctx.fillStyle="#00f5d4"; ctx.fillRect(90,240,clashPower*7.2,38);
      ctx.fillStyle="#c77dff"; ctx.fillRect(90+clashPower*7.2,240,(100-clashPower)*7.2,38);
      ctx.strokeStyle="white"; ctx.lineWidth=3; ctx.strokeRect(90,240,720,38);
      ctx.fillStyle="white"; ctx.font="18px Arial"; ctx.fillText("Player",90,225); ctx.fillText("Boss",770,225);
      ctx.font="22px Arial"; ctx.fillText("Time: "+Math.ceil(clashTimer/60),405,325);
    }

    function drawEnd(){
      drawLevel();
      ctx.fillStyle="rgba(0,0,0,.65)"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="white"; ctx.font="38px Arial"; ctx.fillText(message,260,215);
    }

    function startBoss(){
      gameState = "boss";
      boss.active = true;
      boss.x = 3420; boss.y = 300; boss.health = boss.maxHealth;
      player.x = 3060; player.y = 240; player.vx = 0; player.vy = 0;
      cameraX = 2900;
      projectiles = [];
    }

    function updateSpecialStates(){
      if(gameState === "loading"){ if(--loadingTimer <= 0) gameState = "level"; }
      else if(gameState === "transition"){ if(--cutsceneTimer <= 0) startBoss(); }
      else if(gameState === "bossCutscene"){ if(--cutsceneTimer <= 0){ gameState = "clash"; clashTimer = 360; clashPower = 50; } }
      else if(gameState === "clash"){
        clashTimer--;
        clashPower -= 0.25;
        // Count only new K presses, not holding K forever.
        if(keys.k && !lastKDown) clashPower += 4.2;
        clashPower = clamp(clashPower,0,100);
        if(clashPower >= 100){ boss.health -= 90; gameState = "boss"; invincibleTimer = 80; }
        else if(clashPower <= 0 || clashTimer <= 0){ damagePlayer(38); gameState = "boss"; }
      }
      lastKDown = !!keys.k;
    }

    function win(){ gameState = "win"; message = "Boss defeated! You win!"; restartButton.style.display="inline-block"; }
    function lose(text){ gameState = "lose"; message = text; restartButton.style.display="inline-block"; }

    function draw(){
      if(gameState === "loading") drawLoading();
      else if(gameState === "transition") drawTransition();
      else if(gameState === "bossCutscene") drawBossCutscene();
      else if(gameState === "clash") drawClash();
      else if(gameState === "win" || gameState === "lose") drawEnd();
      else drawLevel();
    }

    function gameLoop(){
      updateSpecialStates();
      if(gameState === "level" || gameState === "boss") updateGame();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function restartGame(){
      gameState = "loading"; loadingTimer = 90; levelTimer = 0; cameraX = 0; message = "";
      respawnTimer = 0; invincibleTimer = 0; bossStarted = false; cutsceneTimer = 0; clashTimer = 0; clashPower = 50;
      player.x=80; player.y=350; player.vx=0; player.vy=0; player.health=player.maxHealth; player.lives=3; player.facing=1; player.attacking=false; player.attackCooldown=0; player.rangedCooldown=0;
      boss.x=3420; boss.y=350; boss.vx=0; boss.vy=0; boss.health=boss.maxHealth; boss.active=false; boss.defeated=false; boss.specialCooldown=260;
      projectiles=[]; spawnEnemies(); restartButton.style.display="none";
    }

    restartButton.addEventListener("click", restartGame);
    spawnEnemies();
    gameLoop();
  </script>
</body>
</html>
